services:

  db:
    image: postgres:17-alpine
    container_name: smart_audit_db
    restart: always
    env_file:
      - .env.db
    volumes:
      - smart_audit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart_audit_backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8003"
    volumes:
      - smart_audit_uploads:/app/uploads
    restart: always
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart_audit_frontend
    expose:
      - "80"
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - internal
      - app_network

volumes:
  smart_audit_pgdata:
  smart_audit_uploads:

networks:
  internal:
  app_network:
    external: true
