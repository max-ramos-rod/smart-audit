services:

  db:
    image: postgres:17-alpine
    container_name: smart_audit_db
    restart: always
    env_file:
      - .env.db
    volumes:
      - smart_audit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart_audit_backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8003"
    volumes:
      - smart_audit_uploads:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - app_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart_audit_frontend
    expose:
      - "80"
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - app_network

volumes:
  smart_audit_pgdata:
  smart_audit_uploads:

networks:
  internal:
  app_network:
    external: true