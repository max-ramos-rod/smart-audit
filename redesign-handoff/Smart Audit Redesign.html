<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Smart Audit — Redesign v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
/* Smart Audit — Design System v2
   Professional, mobile-first SaaS for operational audits
   Palette: Slate navy nav · White surface · Blue accent · Slate bg */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Accent (CTA, interactive, brand) */
  --a:    #2563eb;
  --a-dk: #1d4ed8;
  --a-lt: #eff6ff;
  --a-bd: #bfdbfe;

  /* Navigation surface */
  --nav:    #1e293b;
  --nav-bd: rgba(255,255,255,0.07);

  /* Neutral scale */
  --n900: #0f172a;
  --n800: #1e293b;
  --n700: #334155;
  --n600: #475569;
  --n500: #64748b;
  --n400: #94a3b8;
  --n300: #cbd5e1;
  --n200: #e2e8f0;
  --n150: #edf1f7;
  --n100: #f1f5f9;
  --n50:  #f8fafc;

  /* Semantic */
  --ok:   #16a34a; --ok-bg:   #f0fdf4; --ok-bd:   #bbf7d0;
  --warn: #d97706; --warn-bg: #fffbeb; --warn-bd: #fde68a;
  --err:  #dc2626; --err-bg:  #fef2f2; --err-bd:  #fecaca;

  /* Surfaces */
  --bg:      #f1f5f9;
  --surface: #ffffff;
  --s2:      #f8fafc;
  --border:  #e2e8f0;
  --bord-s:  #cbd5e1;

  /* Text */
  --tx:  #0f172a;
  --tx2: #475569;
  --txm: #94a3b8;

  /* Typography */
  --sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'DM Mono', ui-monospace, monospace;

  /* Radius */
  --r1: 4px;  --r2: 6px;  --r3: 8px;
  --r4: 12px; --r5: 16px; --r6: 20px;

  /* Shadow */
  --sh0: 0 1px 2px rgb(0 0 0/.05);
  --sh1: 0 1px 3px rgb(0 0 0/.1), 0 1px 2px -1px rgb(0 0 0/.1);
  --sh2: 0 4px 6px -1px rgb(0 0 0/.1), 0 2px 4px -2px rgb(0 0 0/.1);
  --sh3: 0 10px 15px -3px rgb(0 0 0/.1), 0 4px 6px -4px rgb(0 0 0/.1);

  /* Layout */
  --sb-w:    248px;
  --hdr-h:   56px;
  --bnav-h:  64px;
}

html {
  font-family: var(--sans);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body { background: var(--bg); color: var(--tx); min-height: 100dvh; }

@keyframes fadein {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fadein { animation: fadein 0.18s ease both; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  font-family: var(--sans); font-size: 13px; font-weight: 600; line-height: 1;
  border: 1px solid transparent; border-radius: var(--r3);
  padding: 9px 16px; cursor: pointer; white-space: nowrap;
  transition: background .15s, border-color .15s, box-shadow .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active  { transform: scale(.97); }
.btn:disabled{ opacity: .55; cursor: not-allowed; pointer-events: none; }
.btn svg     { width: 14px; height: 14px; flex-shrink: 0; }

.btn-p  { background: var(--a);  color: #fff; box-shadow: 0 1px 2px rgb(0 0 0/.15), inset 0 1px 0 rgba(255,255,255,.12); }
.btn-p:hover { background: var(--a-dk); }

.btn-s  { background: var(--surface); color: var(--tx); border-color: var(--border); box-shadow: var(--sh0); }
.btn-s:hover { border-color: var(--bord-s); background: var(--n50); }

.btn-g  { background: transparent; color: var(--tx2); }
.btn-g:hover { background: var(--n100); color: var(--tx); }

.btn-d  { background: var(--err-bg); color: var(--err); border-color: var(--err-bd); }
.btn-d:hover { background: #fee2e2; }

.btn-lg { font-size: 14px; padding: 12px 22px; border-radius: var(--r4); }
.btn-sm { font-size: 12px; padding: 6px 11px; }
.btn-full { width: 100%; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  padding: 3px 7px; border-radius: var(--r2); line-height: 1; white-space: nowrap;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.b-ok   { background:var(--ok-bg);   color:var(--ok);   } .b-ok::before   { background:var(--ok); }
.b-warn { background:var(--warn-bg); color:var(--warn); } .b-warn::before { background:var(--warn); }
.b-err  { background:var(--err-bg);  color:var(--err);  } .b-err::before  { background:var(--err); }
.b-neu  { background:var(--n100);    color:var(--n600); } .b-neu::before  { background:var(--n400); }
.b-a    { background:var(--a-lt);    color:var(--a-dk); } .b-a::before    { background:var(--a); }

.rbadge {
  display:inline-flex; font-size:10px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
  padding:2px 6px; border-radius:var(--r1); line-height:1.5;
}
.rb-owner    { background:#eff6ff; color:#1d4ed8; }
.rb-admin    { background:#faf5ff; color:#7c3aed; }
.rb-manager  { background:#f0f9ff; color:#0369a1; }
.rb-inspector{ background:#f0fdf4; color:#15803d; }
.rb-viewer   { background:var(--n100); color:var(--n600); }

/* ===== INPUTS ===== */
.field { display:grid; gap:5px; }
.flabel { font-size:12px; font-weight:600; color:var(--tx2); }
.input, select.input {
  font-family:var(--sans); font-size:14px; color:var(--tx);
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r3); padding:9px 12px; width:100%; outline:none;
  -webkit-appearance:none; transition:border-color .15s, box-shadow .15s;
}
.input:focus { border-color:var(--a); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
.input:disabled { background:var(--n50); color:var(--txm); cursor:not-allowed; }
.input-err { border-color:var(--err)!important; }
select.input { cursor:pointer; }

/* ===== CARDS ===== */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r4); box-shadow:var(--sh0); }
.card-p { padding:16px; }
@media(min-width:768px){ .card-p { padding:20px; } }

/* ===== LIST ROW ===== */
.lrow {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r4);
  padding:13px 15px; display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:border-color .15s, box-shadow .15s;
}
.lrow:hover { border-color:var(--bord-s); box-shadow:var(--sh1); }
.lrow-main { flex:1; min-width:0; }
.lrow-title { font-size:14px; font-weight:600; color:var(--tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lrow-sub   { font-size:12px; color:var(--txm); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lrow-end   { display:flex; align-items:center; gap:8px; flex-shrink:0; }

/* ===== STAT CARD ===== */
.scard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r4); padding:14px 16px; }
.sc-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--txm); margin-bottom:6px; }
.sc-value { font-size:28px; font-weight:800; letter-spacing:-.03em; color:var(--tx); line-height:1; font-variant-numeric:tabular-nums; }
.sc-desc  { font-size:11px; color:var(--txm); margin-top:4px; }
.sc-accent .sc-value { color:var(--a); }
.sc-ok     .sc-value { color:var(--ok); }

/* ===== SIDEBAR (desktop) ===== */
.sidebar {
  width:var(--sb-w); background:var(--nav);
  display:flex; flex-direction:column;
  position:fixed; inset-block:0; left:0; z-index:100;
}
.sb-top { padding:18px 14px 14px; border-bottom:1px solid var(--nav-bd); }
.sb-logo { display:flex; align-items:center; gap:10px; }
.sb-logo-mark {
  width:32px; height:32px; background:var(--a); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:13px; color:#fff; flex-shrink:0;
  box-shadow:0 2px 8px rgba(37,99,235,.4);
}
.sb-logo-name { font-size:14px; font-weight:700; color:#fff; }
.sb-logo-sub  { font-size:9px; color:rgba(255,255,255,.28); text-transform:uppercase; letter-spacing:.1em; margin-top:1px; }

.sb-nav { flex:1; padding:10px; display:flex; flex-direction:column; gap:1px; overflow-y:auto; }
.sb-sec { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.2); padding:12px 8px 5px; }

.nav-btn {
  display:flex; align-items:center; gap:9px; padding:8px 10px;
  border-radius:var(--r3); color:rgba(255,255,255,.42);
  font-size:13px; font-weight:500; cursor:pointer;
  border:none; background:none; font-family:var(--sans);
  width:100%; text-align:left; transition:color .15s, background .15s;
}
.nav-btn:hover  { color:rgba(255,255,255,.72); background:rgba(255,255,255,.05); }
.nav-btn.active { color:#fff; background:rgba(37,99,235,.28); }
.nav-btn-icon   { width:17px; height:17px; flex-shrink:0; }

.sb-bottom { padding:10px; border-top:1px solid var(--nav-bd); }
.sb-co { padding:6px 10px 8px; }
.sb-co-lbl  { font-size:9px; font-weight:600; color:rgba(255,255,255,.22); text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
.sb-co-name { font-size:12px; font-weight:600; color:rgba(255,255,255,.6); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-user {
  display:flex; align-items:center; gap:9px; padding:8px 10px;
  border-radius:var(--r3); cursor:pointer; transition:background .15s;
}
.sb-user:hover { background:rgba(255,255,255,.06); }
.sb-av {
  width:28px; height:28px; border-radius:50%; background:rgba(37,99,235,.45);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#fff; flex-shrink:0;
}
.sb-user-name { font-size:12px; font-weight:600; color:rgba(255,255,255,.58); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ===== MOBILE HEADER ===== */
.mob-hdr {
  display:flex; align-items:center; height:var(--hdr-h);
  padding:0 16px; background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50; gap:12px;
}
.mob-hdr-brand { display:flex; align-items:center; gap:8px; flex:1; }
.mob-hdr-mark {
  width:26px; height:26px; background:var(--a); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:11px; color:#fff;
}
.mob-hdr-name { font-size:14px; font-weight:700; color:var(--tx); }
.mob-av {
  width:30px; height:30px; border-radius:50%; background:var(--a-lt);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--a-dk);
}

/* ===== BOTTOM NAV ===== */
.bot-nav {
  display:flex; height:var(--bnav-h);
  background:var(--surface); border-top:1px solid var(--border);
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bn-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; cursor:pointer; color:var(--n400);
  font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  border:none; background:none; font-family:var(--sans);
  -webkit-tap-highlight-color:transparent; position:relative;
  transition:color .15s; padding:8px 4px;
}
.bn-item.active { color:var(--a); }
.bn-item.active::after {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:22px; height:2px; background:var(--a); border-radius:0 0 2px 2px;
}
.bn-icon { width:21px; height:21px; }

/* ===== APP LAYOUT ===== */
.app-root { display:flex; min-height:100dvh; }
.app-body { flex:1; min-width:0; }
@media(min-width:768px){
  .app-body    { margin-left:var(--sb-w); }
  .sidebar     { display:flex!important; }
  .bot-nav     { display:none!important; }
  .mob-hdr     { display:none!important; }
}
@media(max-width:767px){
  .sidebar     { display:none!important; }
  .app-body    { padding-bottom:var(--bnav-h); }
}

/* ===== PAGE CONTENT ===== */
.page { padding:20px 16px; max-width:1100px; }
@media(min-width:768px){ .page { padding:28px 28px; } }

.phdr { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.eyebrow { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--a); margin-bottom:4px; }
.page-h1 { font-size:22px; font-weight:700; letter-spacing:-.02em; color:var(--tx); line-height:1.2; }
.page-desc { font-size:13px; color:var(--txm); margin-top:3px; }
@media(min-width:768px){ .page-h1 { font-size:26px; } }

.slabel { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--txm); margin-bottom:10px; }

/* ===== STATS GRID ===== */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media(min-width:768px){ .stats-grid { grid-template-columns:repeat(4,1fr); gap:12px; } }

/* ===== LIST STACK ===== */
.lstack { display:flex; flex-direction:column; gap:8px; }

/* ===== EMPTY ===== */
.empty {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r4);
  padding:40px 24px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-icon { color:var(--n300); width:36px; height:36px; }
.empty-h    { font-size:15px; font-weight:700; color:var(--tx); }
.empty-p    { font-size:13px; color:var(--txm); }

/* ===== SEARCH BAR ===== */
.sbar {
  display:flex; align-items:center; gap:9px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r3); padding:8px 12px;
}
.sbar:focus-within { border-color:var(--a); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.sbar-ico { color:var(--txm); width:15px; height:15px; flex-shrink:0; }
.sbar input {
  border:none; outline:none; font-family:var(--sans); font-size:13px;
  color:var(--tx); background:transparent; flex:1; min-width:0;
}
.sbar input::placeholder { color:var(--txm); }

/* ===== FILTER TABS ===== */
.ftabs { display:flex; gap:3px; padding:3px; background:var(--n100); border-radius:var(--r3); }
.ftab {
  flex:1; padding:7px 10px; border-radius:calc(var(--r3) - 2px);
  font-size:12px; font-weight:600; color:var(--txm); cursor:pointer;
  border:none; background:none; font-family:var(--sans);
  transition:all .15s; text-align:center; white-space:nowrap;
}
.ftab.active { background:var(--surface); color:var(--tx); box-shadow:var(--sh0); }

/* ===== FAB ===== */
.fab {
  position:fixed; bottom:calc(var(--bnav-h) + 14px); right:16px;
  width:50px; height:50px; border-radius:50%;
  background:var(--a); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--sh3); border:none; z-index:90;
  transition:background .15s, transform .1s;
}
.fab:hover { background:var(--a-dk); transform:translateY(-1px); }
.fab:active { transform:scale(.95); }
@media(min-width:768px){ .fab { display:none; } }

/* ===== PROGRESS ===== */
.prog-wrap { height:5px; background:var(--n200); border-radius:99px; overflow:hidden; }
.prog-fill { height:100%; background:var(--a); border-radius:99px; transition:width .4s; }
.prog-fill.ok { background:var(--ok); }

/* ===== LOGIN ===== */
.login-root { min-height:100dvh; display:grid; }
@media(min-width:768px){
  .login-root { grid-template-columns:400px 1fr; }
  .login-brand { display:flex!important; }
}
.login-brand {
  display:none; flex-direction:column; justify-content:space-between;
  padding:36px; background:var(--nav); position:relative; overflow:hidden;
}
.login-brand::before {
  content:''; position:absolute; top:-80px; right:-80px;
  width:360px; height:360px; border-radius:50%; background:rgba(37,99,235,.09);
}
.login-brand::after {
  content:''; position:absolute; bottom:-80px; left:-40px;
  width:280px; height:280px; border-radius:50%; background:rgba(37,99,235,.06);
}
.lb-inner { position:relative; z-index:1; }
.lb-mark {
  width:44px; height:44px; background:var(--a); border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:800; color:#fff;
  box-shadow:0 6px 16px rgba(37,99,235,.45); margin-bottom:20px;
}
.lb-h { font-size:28px; font-weight:700; color:#fff; line-height:1.2; letter-spacing:-.02em; margin-bottom:10px; }
.lb-p { font-size:13px; color:rgba(255,255,255,.38); line-height:1.6; }
.lb-pills { display:flex; flex-direction:column; gap:9px; position:relative; z-index:1; }
.lb-pill {
  display:flex; align-items:center; gap:10px;
  font-size:12px; color:rgba(255,255,255,.42);
}
.lb-pill::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--a); flex-shrink:0; }

.lfa { display:flex; align-items:center; justify-content:center; padding:40px 24px; }
.lfb { width:100%; max-width:380px; }
.lf-mob-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
@media(min-width:768px){ .lf-mob-logo { display:none; } }
.lf-mob-mark {
  width:34px; height:34px; background:var(--a); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:800; color:#fff;
}
.lf-mob-name { font-size:17px; font-weight:700; color:var(--tx); }
.lf-h   { font-size:22px; font-weight:700; letter-spacing:-.02em; color:var(--tx); margin-bottom:4px; }
.lf-sub { font-size:13px; color:var(--txm); margin-bottom:24px; }
.lf-form { display:grid; gap:14px; }
.lf-err {
  font-size:13px; color:var(--err); background:var(--err-bg);
  border:1px solid var(--err-bd); border-radius:var(--r3); padding:9px 12px;
}

/* ===== FIELD PANEL (submission detail) ===== */
.fpanel { background:var(--surface); border:1px solid var(--border); border-radius:var(--r4); overflow:hidden; }
.frow { padding:14px 16px; border-bottom:1px solid var(--border); }
.frow:last-child { border-bottom:none; }
.frow-type { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--txm); margin-bottom:3px; }
.frow-name { font-size:14px; font-weight:600; color:var(--tx); margin-bottom:8px; }
.req-star  { color:var(--err); }

/* ===== SCORE DISPLAY ===== */
.score-big { font-size:36px; font-weight:800; letter-spacing:-.03em; color:var(--ok); font-variant-numeric:tabular-nums; line-height:1; }
.score-unit{ font-size:18px; font-weight:600; color:var(--ok); }
.score-warn .score-big, .score-warn .score-unit { color:var(--warn); }

/* ===== STICKY BOTTOM ACTIONS ===== */
.sticky-act {
  position:sticky; bottom:0; background:var(--surface);
  border-top:1px solid var(--border); padding:12px 16px;
  display:flex; gap:10px; margin-top:20px; z-index:10;
}
@media(min-width:768px){
  .sticky-act { position:static; background:transparent; border:none; padding:0; margin-top:16px; }
}

/* ===== BACK HEADER ===== */
.back-hdr { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.back-btn {
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:var(--r3);
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; color:var(--tx2); transition:background .15s; flex-shrink:0;
}
.back-btn:hover { background:var(--n50); color:var(--tx); }
.back-btn svg { width:16px; height:16px; }

/* ===== USERS LAYOUT ===== */
.users-layout { display:grid; gap:16px; }
@media(min-width:768px){ .users-layout { grid-template-columns:320px 1fr; } }

/* ===== TABLE ===== */
.tbl { width:100%; border-collapse:collapse; }
.tbl th {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--txm); padding:10px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap;
}
.tbl td { padding:11px 16px; font-size:13px; color:var(--tx); border-bottom:1px solid var(--border); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tbody tr:hover td { background:var(--n50); }
.tbl-name { font-weight:600; }
.tbl-muted{ color:var(--txm); }

/* ===== INFO BOX ===== */
.info-box {
  background:var(--a-lt); border:1px solid var(--a-bd);
  border-radius:var(--r3); padding:10px 14px;
  font-size:12px; color:var(--a-dk); line-height:1.6;
}

/* ===== DIVIDER ===== */
.div { height:1px; background:var(--border); }

/* ===== UTILITIES ===== */
.flex     { display:flex; }
.grid     { display:grid; }
.col      { flex-direction:column; }
.i-ctr    { align-items:center; }
.i-start  { align-items:flex-start; }
.j-btwn   { justify-content:space-between; }
.j-ctr    { justify-content:center; }
.f1       { flex:1; min-width:0; }
.fw       { flex-wrap:wrap; }
.w-full   { width:100%; }
.shrink-0 { flex-shrink:0; }
.truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tx2c     { color:var(--tx2); }
.txm      { color:var(--txm); }
.fw6      { font-weight:600; }
.fw7      { font-weight:700; }
.fw8      { font-weight:800; }
.fz11     { font-size:11px; }
.fz12     { font-size:12px; }
.fz13     { font-size:13px; }
.fz14     { font-size:14px; }
.gap4     { gap:4px; }
.gap8     { gap:8px; }
.gap10    { gap:10px; }
.gap12    { gap:12px; }
.gap16    { gap:16px; }
.gap20    { gap:20px; }
.gap24    { gap:24px; }
.mb4      { margin-bottom:4px; }
.mb8      { margin-bottom:8px; }
.mb10     { margin-bottom:10px; }
.mb12     { margin-bottom:12px; }
.mb16     { margin-bottom:16px; }
.mb20     { margin-bottom:20px; }
.mb24     { margin-bottom:24px; }
.mt4      { margin-top:4px; }
.mt8      { margin-top:8px; }
.mt12     { margin-top:12px; }
.mt16     { margin-top:16px; }
.mt20     { margin-top:20px; }

/* ===== TWEAKS PANEL ===== */
.tweaks-panel {
  position:fixed; bottom:80px; right:16px; z-index:999;
  width:260px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r5); box-shadow:var(--sh3); overflow:hidden;
}
@media(min-width:768px){ .tweaks-panel { bottom:24px; } }
.tweaks-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:700; color:var(--tx);
}
.tweaks-body { padding:14px 16px; display:flex; flex-direction:column; gap:14px; }
.tweak-label { font-size:11px; font-weight:600; color:var(--tx2); margin-bottom:7px; }
.tweak-swatches { display:flex; gap:8px; }
.tweak-swatch {
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform .15s, border-color .15s;
}
.tweak-swatch:hover     { transform:scale(1.12); }
.tweak-swatch.selected  { border-color:var(--tx); }
.tweak-segs { display:flex; gap:3px; padding:3px; background:var(--n100); border-radius:var(--r3); }
.tweak-seg  {
  flex:1; padding:6px; border-radius:calc(var(--r3) - 2px); font-size:11px; font-weight:600;
  color:var(--txm); cursor:pointer; border:none; background:none; font-family:var(--sans);
  text-align:center; transition:all .15s;
}
.tweak-seg.active { background:var(--surface); color:var(--tx); box-shadow:var(--sh0); }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ============================================================
// sa-components.jsx
// ============================================================
// Smart Audit — Shared Components v2
// Icons, UI primitives, AppShell (sidebar + bottom nav)

const { useState, useEffect, useRef } = React;

// ============================================================
// ICONS (24x24 viewBox, stroke-based)
// ============================================================
const IcoHome = () => (

const IcoPlus = () => (

const IcoChevron = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="100%" height="100%">

);

const IcoClose = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" width="100%" height="100%">

);

const IcoPhoto = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="100%" height="100%">
    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
);

const IcoShield = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="100%" height="100%">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </svg>
);

const IcoBell = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" width="100%" height="100%">
    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
  </svg>
);

const IcoSettings = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" width="100%" height="100%">
    <line x1="4" y1="6" x2="20" y2="6"/>
    <line x1="4" y1="12" x2="20" y2="12"/>
    <line x1="4" y1="18" x2="20" y2="18"/>
    <circle cx="8" cy="6" r="2"/>
    <circle cx="16" cy="12" r="2"/>
    <circle cx="10" cy="18" r="2"/>
  </svg>
);

// ============================================================
// BUTTON
// ============================================================
const Btn = ({ variant = 'p', size, full, disabled, onClick, children, type = 'button' }) => {
  const cls = [
    'btn',
    'btn-' + variant,
    size === 'lg' ? 'btn-lg' : '',
    size === 'sm' ? 'btn-sm' : '',
    full ? 'btn-full' : '',
  ].filter(Boolean).join(' ');
  return (
    <button type={type} className={cls} disabled={disabled} onClick={onClick}>
      {children}
    </button>
  );
};

// ============================================================
// BADGES
// ============================================================
const STATUS_MAP = {
  in_progress: ['b-warn', 'Em andamento'],
  completed:   ['b-ok',   'Concluída'],
  draft:       ['b-neu',  'Rascunho'],
  cancelled:   ['b-err',  'Cancelada'],
};

const StatusBadge = ({ status }) => {
  const entry = STATUS_MAP[status] || ['b-neu', status];
  return <span className={'badge ' + entry[0]}>{entry[1]}</span>;
};

const FORM_STATUS_MAP = {
  published: ['b-ok',  'Publicado'],
  draft:     ['b-neu', 'Rascunho'],
};

const FormBadge = ({ status }) => {
  const entry = FORM_STATUS_MAP[status] || ['b-neu', status];
  return <span className={'badge ' + entry[0]}>{entry[1]}</span>;
};

const ROLE_MAP = {
  OWNER:     'rb-owner',
  ADMIN:     'rb-admin',
  MANAGER:   'rb-manager',
  INSPECTOR: 'rb-inspector',
  VIEWER:    'rb-viewer',
};

const RoleBadge = ({ role }) => (
  <span className={'rbadge ' + (ROLE_MAP[role] || 'rb-viewer')}>{role}</span>
);

// ============================================================
// STAT CARD
// ============================================================
const StatCard = ({ label, value, desc, variant }) => (
  <div className={'scard' + (variant ? ' sc-' + variant : '')}>
    <div className="sc-label">{label}</div>
    <div className="sc-value">{value}</div>
    {desc && <div className="sc-desc">{desc}</div>}
  </div>
);

// ============================================================
// LIST ROW
// ============================================================
const ListRow = ({ title, sub, right, onClick }) => (
  <div className="lrow" onClick={onClick}>
    <div className="lrow-main">
      <div className="lrow-title">{title}</div>
      {sub && <div className="lrow-sub">{sub}</div>}
    </div>
    {right && <div className="lrow-end">{right}</div>}
    <div style={{ width: 14, height: 14, color: 'var(--txm)', flexShrink: 0 }}>
      <IcoChevron />
    </div>
  </div>
);

// ============================================================
// EMPTY STATE
// ============================================================
const EmptyState = ({ icon, title, desc, action }) => (
  <div className="empty">
    <div className="empty-icon">{icon || <IcoForms />}</div>
    <div className="empty-h">{title}</div>
    {desc && <div className="empty-p">{desc}</div>}
    {action && <div style={{ marginTop: 4 }}>{action}</div>}
  </div>
);

// ============================================================
// SEARCH BAR
// ============================================================
const SearchBar = ({ value, onChange, placeholder }) => (
  <div className="sbar mb16">
    <div className="sbar-ico"><IcoSearch /></div>
    <input value={value} onChange={function(e){ onChange(e.target.value); }} placeholder={placeholder || 'Buscar...'} />
  </div>
);

// ============================================================
// FILTER TABS
// ============================================================
const FilterTabs = ({ items, active, onChange }) => (
  <div className="ftabs mb16">
    {items.map(function(item) {
      return (
        <button key={item.id} className={'ftab' + (active === item.id ? ' active' : '')}
          onClick={function(){ onChange(item.id); }}>
          {item.label}
          {item.count != null && <span style={{ marginLeft: 4, opacity: 0.6 }}>({item.count})</span>}
        </button>
      );
    })}
  </div>
);

// ============================================================
// PROGRESS BAR
// ============================================================
const ProgressBar = ({ value, max, ok }) => {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div>
      <div className="prog-wrap">
        <div className={'prog-fill' + (ok ? ' ok' : '')} style={{ width: pct + '%' }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 5, fontSize: 11, color: 'var(--txm)' }}>
        <span>{value} de {max} campos preenchidos</span>
        <span style={{ fontWeight: 700 }}>{pct}%</span>
      </div>
    </div>
  );
};

// ============================================================
// SECTION HEADER
// ============================================================
const SectionHeader = ({ eyebrow, title, desc, action }) => (
  <div className="phdr">
    <div>
      {eyebrow && <div className="eyebrow">{eyebrow}</div>}
      <h1 className="page-h1">{title}</h1>
      {desc && <p className="page-desc">{desc}</p>}
    </div>
    {action && <div style={{ flexShrink: 0 }}>{action}</div>}
  </div>
);

// ============================================================
// BACK HEADER
// ============================================================
const BackHeader = ({ title, subtitle, badge, onBack, action }) => (
  <div className="back-hdr">
    <button className="back-btn" onClick={onBack}><IcoBack /></button>
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
        <h1 style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-.01em', color: 'var(--tx)' }}>{title}</h1>
        {badge}
      </div>
      {subtitle && <div style={{ fontSize: 12, color: 'var(--txm)', marginTop: 2 }}>{subtitle}</div>}
    </div>
    {action && <div style={{ flexShrink: 0 }}>{action}</div>}
  </div>
);

// ============================================================
// FIELD ROW (submission detail)
// ============================================================
const FieldRow = ({ field, value, onChange, disabled }) => {
  const typeLabel = { boolean:'Sim/Não', text:'Texto', number:'Número', date:'Data', photo:'Foto', select:'Seleção' }[field.type] || field.type;
  return (
    <div className="frow">
      <div className="frow-type">{typeLabel}</div>
      <div className="frow-name">
        {field.label}
        {field.required && <span className="req-star"> *</span>}
      </div>
      {field.type === 'boolean' && (
        <select className="input" value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled}>
          <option value="">— Sem resposta —</option>
          <option value="true">✓ Sim (conforme)</option>
          <option value="false">✗ Não (não conforme)</option>
        </select>
      )}
      {field.type === 'number' && (
        <input className="input" type="number" step="any" placeholder="Informe um número"
          value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled} />
      )}
      {field.type === 'date' && (
        <input className="input" type="date"
          value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled} />
      )}
      {field.type === 'text' && (
        <input className="input" type="text" placeholder="Informe o valor"
          value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled} />
      )}
      {field.type === 'select' && (
        Array.isArray(field.config_json && field.config_json.options) && field.config_json.options.length > 0 ? (
          <select className="input" value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled}>
            <option value="">— Selecione uma opção —</option>
            {field.config_json.options.map(function(opt) {
              return <option key={opt} value={opt}>{opt}</option>;
            })}
          </select>
        ) : (
          <input className="input" type="text" placeholder="Digite a opção"
            value={value || ''} onChange={function(e){ onChange(e.target.value); }} disabled={disabled} />
        )
      )}
      {field.type === 'photo' && (
        <div>
          {value ? (
            <div style={{ background:'var(--n100)', borderRadius:'var(--r3)', padding:'12px 14px', display:'flex', alignItems:'center', gap:8, fontSize:12, color:'var(--ok)', fontWeight:600 }}>
              <div style={{ width:14, height:14, flexShrink:0 }}><IcoPhoto /></div>
              Foto anexada
            </div>
          ) : (
            <label style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:'var(--n50)', border:'1px dashed var(--n300)', borderRadius:'var(--r3)', cursor: disabled ? 'not-allowed' : 'pointer', fontSize:13, color:'var(--tx2)', fontWeight:500 }}>
              <div style={{ width:16, height:16, color:'var(--txm)' }}><IcoPhoto /></div>
              {disabled ? 'Sem foto' : 'Selecionar arquivo'}
              {!disabled && <input type="file" accept="image/*" style={{ display:'none' }} onChange={function(){ onChange('__photo_attached__'); }} />}
            </label>
          )}
        </div>
      )}
    </div>
  );
};

// ============================================================
// FIELD EDITOR (form creation)
// ============================================================
const FieldEditor = ({ field, index, onChange, onRemove, canRemove }) => (
  <div className="card card-p mb8">
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
      <span style={{ fontSize:11, fontWeight:700, color:'var(--txm)', textTransform:'uppercase', letterSpacing:'.08em' }}>
        Campo {index + 1}
      </span>
      {canRemove && <button className="btn btn-g btn-sm" onClick={onRemove} type="button">Remover</button>}
    </div>
    <div style={{ display:'grid', gap:10, gridTemplateColumns:'1fr 1fr' }}>
      <div className="field">
        <label className="flabel">Chave</label>
        <input className="input" value={field.key} onChange={function(e){ onChange(Object.assign({}, field, { key: e.target.value })); }} placeholder="campo_chave" required />
      </div>
      <div className="field">
        <label className="flabel">Label</label>
        <input className="input" value={field.label} onChange={function(e){ onChange(Object.assign({}, field, { label: e.target.value })); }} placeholder="Texto do campo" required />
      </div>
      <div className="field">
        <label className="flabel">Tipo</label>
        <select className="input" value={field.field_type} onChange={function(e){ onChange(Object.assign({}, field, { field_type: e.target.value })); }}>
          <option value="boolean">Sim / Não</option>
          <option value="text">Texto</option>
          <option value="number">Número</option>
          <option value="select">Seleção</option>
          <option value="date">Data</option>
          <option value="photo">Foto</option>
        </select>
      </div>
      <div className="field">
        <label className="flabel">Obrigatório</label>
        <select className="input" value={field.required ? 'true' : 'false'} onChange={function(e){ onChange(Object.assign({}, field, { required: e.target.value === 'true' })); }}>
          <option value="false">Não</option>
          <option value="true">Sim</option>
        </select>
      </div>
    </div>
  </div>
);

// ============================================================
// NAV CONFIG
// ============================================================
const NAV_ITEMS = [
  { id: 'dashboard',   label: 'Resumo',      Icon: IcoHome  },
  { id: 'forms',       label: 'Formulários', Icon: IcoForms },
  { id: 'submissions', label: 'Inspeções',   Icon: IcoCheck },
  { id: 'teams',       label: 'Equipes',     Icon: IcoUsers },
  { id: 'users',       label: 'Usuários',    Icon: IcoUsers },
];

const MOCK_COMPANY = 'Petrobrás Distribuidora';
const MOCK_USER    = { name: 'Carlos Mendes', initials: 'CM' };

// ============================================================
// SIDEBAR (desktop)
// ============================================================
const Sidebar = ({ active, onNav, onLogout, onProfile, onCompany, onSettings, onSearch, onNotifs, unreadCount }) => (
  <aside className="sidebar">
    <div className="sb-top">
      <div className="sb-logo">
        <div className="sb-logo-mark">SA</div>
        <div>
          <div className="sb-logo-name">Smart Audit</div>
          <div className="sb-logo-sub">Plataforma operacional</div>
        </div>
      </div>
    </div>

    <nav className="sb-nav">
      <div className="sb-sec">Principal</div>
      {NAV_ITEMS.map(function(item) {
        const isActive = active === item.id
          || (active === 'submission-detail' && item.id === 'submissions')
          || (active === 'inspection-report' && item.id === 'submissions')
          || (active === 'form-detail' && item.id === 'forms')
          || (active === 'form-version-history' && item.id === 'forms')
          || (active === 'invite-user' && item.id === 'users')

// ============================================================
const SubmissionDetailScreen = ({ submissionId, onBack }) => {
  const submission = MOCK_SUBMISSIONS.find(s => s.id === submissionId) || MOCK_SUBMISSIONS[0];
  const isCompleted = submission.status === 'completed';

  const [answers, setAnswers] = useState({});
  const [saved, setSaved] = useState(false);
  const [finished, setFinished] = useState(false);
  const [pendingFields, setPendingFields] = useState([]);
  const [finishError, setFinishError] = useState('');

  const answered = MOCK_FIELDS.filter(f => answers[f.key] && answers[f.key] !== '').length;
  const total = MOCK_FIELDS.length;

  const handleSave = () => {
    setSaved(true);
    setPendingFields([]);
    setFinishError('');
    setTimeout(() => setSaved(false), 2000);
  };

  const handleFinish = () => {
    setFinishError('');
    const missing = MOCK_FIELDS
      .filter(f => f.required)
      .filter(f => !answers[f.key] || answers[f.key] === '')
      .map(f => f.key);
    if (missing.length > 0) {
      setPendingFields(missing);
      setFinishError(`${missing.length} campo(s) obrigatório(s) não preenchido(s): ${missing.join(', ')}`);
      return;
    }
    setPendingFields([]);
    setFinished(true);
  };

  // ScoreBreakdown mock: calculado dos campos booleanos respondidos
  const boolFields = MOCK_FIELDS.filter(f => f.type === 'boolean');
  const conformes = boolFields.filter(f => answers[f.key] === 'true').length;
  const naoConformes = boolFields.filter(f => answers[f.key] === 'false').length;
  const semResposta = boolFields.filter(f => !answers[f.key] || answers[f.key] === '').length;

  const scoreColor = submission.score >= 85 ? 'var(--ok)' : submission.score >= 65 ? 'var(--warn)' : 'var(--err)';

  return (
    <div className="page fadein" data-screen-label="Detalhe da Inspeção">
      <BackHeader
        title={submission.form_name}
        subtitle={`Iniciada em ${fmtDatetime(submission.started_at)}`}
        badge={<StatusBadge status={submission.status} />}
        onBack={onBack}
      />

      {/* Score card — completed only */}
      {isCompleted && submission.score != null && (
        <div className="card card-p mb16">
          <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 14 }}>
            <div>
              <div className="eyebrow mb4">Score final</div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                <span className="score-big" style={{ color: scoreColor }}>{submission.score}</span>
                <span className="score-unit" style={{ color: scoreColor }}>%</span>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div className="prog-wrap"><div className="prog-fill ok" style={{ width: `${submission.score}%` }} /></div>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
            {[
              ['Conformes', conformes, 'var(--ok)', 'var(--ok-bg)'],
              ['Não conformes', naoConformes, 'var(--err)', 'var(--err-bg)'],
              ['Sem resposta', semResposta, 'var(--txm)', 'var(--n100)'],
            ].map(([lbl, val, color, bg]) => (
              <div key={lbl} style={{ background: bg, borderRadius: 'var(--r3)', padding: '8px 10px', textAlign: 'center' }}>
                <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--txm)', marginBottom: 4 }}>{lbl}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color, fontVariantNumeric: 'tabular-nums' }}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: 'var(--txm)', marginTop: 8 }}>{boolFields.length} campos booleanos avaliados</div>
        </div>
      )}

      {/* Progress — in_progress only */}
      {!isCompleted && !finished && (
        <div className="card card-p mb16">
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 12, color: 'var(--tx2)' }}>
            <span style={{ fontWeight: 600 }}>Progresso da inspeção</span>
            <span style={{ color: 'var(--txm)' }}>{answered}/{total} campos</span>
          </div>
          <ProgressBar value={answered} max={total} />
        </div>
      )}

      {/* Finished banner */}
      {finished && (
        <div className="fadein" style={{
          background: 'var(--ok-bg)', border: '1px solid var(--ok-bd)',
          borderRadius: 'var(--r4)', padding: '14px 16px', marginBottom: 16,
          display: 'flex', alignItems: 'center', gap: 10
        }}>
          <div style={{ width: 20, height: 20, color: 'var(--ok)', flexShrink: 0 }}><IcoCheck /></div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--ok)' }}>Inspeção finalizada com sucesso</div>
            <div style={{ fontSize: 12, color: 'var(--ok)', opacity: .8 }}>Score calculado pelo sistema após processamento.</div>
          </div>
        </div>
      )}

      {/* Validation error */}
      {finishError && (
        <div className="fadein" style={{ background: 'var(--err-bg)', border: '1px solid var(--err-bd)', borderRadius: 'var(--r3)', padding: '10px 14px', marginBottom: 12, fontSize: 12, color: 'var(--err)', lineHeight: 1.5 }}>
          ⚠ {finishError}
        </div>
      )}

      {/* Fields */}
      <div className="slabel mb10">Campos da inspeção</div>
      <div className="fpanel mb4">
        {MOCK_FIELDS.map(field => (
          <div key={field.key} style={{
            border: pendingFields.includes(field.key) ? '2px solid var(--err)' : 'none',
            borderRadius: pendingFields.includes(field.key) ? 'var(--r3)' : 0,
            background: pendingFields.includes(field.key) ? 'var(--err-bg)' : 'transparent',
          }}>
            {pendingFields.includes(field.key) && (
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--err)', padding: '6px 16px 0', textTransform: 'uppercase', letterSpacing: '.06em' }}>
                ⚠ Campo obrigatório
              </div>
            )}
            <FieldRow
              field={field}
              value={answers[field.key]}
              onChange={val => {
                setAnswers(prev => ({ ...prev, [field.key]: val }));
                if (pendingFields.includes(field.key) && val && val !== '') {
                  setPendingFields(prev => prev.filter(k => k !== field.key));
                }
              }}
              disabled={isCompleted || finished}
            />
          </div>
        ))}
      </div>

      {/* Actions */}
      {!isCompleted && !finished && (
        <div className="sticky-act">
          <Btn variant="s" onClick={handleSave}>
            {saved ? '✓ Salvo' : 'Salvar rascunho'}
          </Btn>
          <Btn variant="p" onClick={handleFinish}>
            Finalizar inspeção
          </Btn>
        </div>
      )}

      {(isCompleted || finished) && (
        <div className="sticky-act">
          <Btn variant="p" onClick={() => window.__saOpenReport && window.__saOpenReport(submissionId)}>
            Ver relatório completo →
          </Btn>
        </div>
      )}
    </div>
  );
};

const UsersScreen = ({ onInvite }) => {

  return (

      <div className="users-layout">

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div>
              <div className="eyebrow">{isEditing ? 'Edição' : 'Criação'}</div>

                {isEditing ? 'Editar usuário' : 'Novo usuário'}

          <form onSubmit={handleSubmit} style={{ display: 'grid', gap: 12 }}>

                onChange={e => setForm(p => ({ ...p, name: e.target.value }))} />
            </div>
            <div className="field">
              <label className="flabel">E-mail</label>
              <input className="input" type="email" required disabled={isEditing} value={form.email}
                onChange={e => setForm(p => ({ ...p, email: e.target.value }))} />
            </div>
            <div className="field">
              <label className="flabel">{isEditing ? 'Nova senha (opcional)' : 'Senha inicial'}</label>
              <input className="input" type="password" required={!isEditing} minLength={8}
                placeholder={isEditing ? 'Deixe em branco para manter' : ''}
                value={form.password} onChange={e => setForm(p => ({ ...p, password: e.target.value }))} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div className="field">
                <label className="flabel">Papel</label>
                <select className="input" value={form.role} onChange={e => setForm(p => ({ ...p, role: e.target.value }))}>
                  {['OWNER','ADMIN','MANAGER','INSPECTOR','VIEWER'].map(r => (
                    <option key={r} value={r}>{r}</option>
                  ))}
                </select>
              </div>
              <div className="field">
                <label className="flabel">Status</label>
                <select className="input" value={form.is_active ? 'true' : 'false'}
                  onChange={e => setForm(p => ({ ...p, is_active: e.target.value === 'true' }))}>
                  <option value="true">Ativo</option>
                  <option value="false">Inativo</option>
                </select>
              </div>
            </div>

            {saved && (
              <div style={{ fontSize: 13, color: 'var(--ok)', fontWeight: 600, padding: '8px 0' }}>
                ✓ Usuário salvo com sucesso.
              </div>
            )}

            <div style={{ display: 'flex', gap: 8 }}>
              <Btn variant="p" type="submit" full>{isEditing ? 'Salvar alterações' : 'Criar usuário'}</Btn>
            </div>
            {isEditing && (
              <Btn variant="g" full onClick={reset}>Cancelar edição</Btn>
            )}
          </form>
        </div>

        {/* List panel */}
        <div>
          {/* Mobile cards */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {/* Desktop table */}
            <div className="card" style={{ overflowX: 'auto' }}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Papel</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id}>
                      <td className="tbl-name">{u.name}</td>
                      <td className="tbl-muted" style={{ fontFamily: 'var(--mono)', fontSize: 12 }}>{u.email}</td>
                      <td><RoleBadge role={u.role} /></td>
                      <td>

                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

const ForgotPasswordScreen = ({ onBack }) => {
  const [step, setStep]   = useState('request');
  const [email, setEmail] = useState('');
  const [pw1, setPw1]     = useState('');
  const [pw2, setPw2]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]     = useState('');

  const handleRequest = (e) => {
    e.preventDefault();
    setErr('');
    if (!email) { setErr('Informe seu e-mail.'); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); setStep('sent'); }, 800);
  };

  const handleReset = (e) => {
    e.preventDefault();
    setErr('');
    if (pw1.length < 8) { setErr('A senha deve ter no mínimo 8 caracteres.'); return; }
    if (pw1 !== pw2)    { setErr('As senhas não coincidem.'); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); setStep('done'); }, 800);
  };

  return (
    <div className="login-root" data-screen-label="Recuperação de Senha">

      {/* Brand panel — desktop only */}
      <div className="login-brand">
        <div className="lb-inner">
          <div className="lb-mark">SA</div>
          <div className="lb-h">Recuperar<br />seu acesso.</div>
          <div className="lb-p">Enviaremos um link seguro para o e-mail cadastrado. O link expira em 1 hora.</div>
        </div>
        <div className="lb-pills">
          <div className="lb-pill">Link enviado por e-mail corporativo</div>
          <div className="lb-pill">Expira automaticamente em 1 hora</div>
          <div className="lb-pill">Sem risco de exposição de dados</div>
        </div>
      </div>

      {/* Form area */}
      <div className="lfa">
        <div className="lfb fadein">

          {/* Mobile logo */}
          <div className="lf-mob-logo">
            <div className="lf-mob-mark">SA</div>
            <div className="lf-mob-name">Smart Audit</div>
          </div>

          {/* Step: request */}
          {step === 'request' && (
            <>
              <div className="lf-h">Recuperar acesso</div>
              <div className="lf-sub">Informe seu e-mail para receber o link de redefinição.</div>
              <form className="lf-form" onSubmit={handleRequest}>
                <div className="field">
                  <label className="flabel">E-mail cadastrado</label>
                  <input className="input" type="email" required autoFocus
                    value={email} onChange={e => setEmail(e.target.value)} placeholder="seu@email.com" />
                </div>
                {err && <div className="lf-err">{err}</div>}
                <Btn variant="p" size="lg" full type="submit" disabled={loading}>
                  {loading ? 'Enviando...' : 'Enviar link de recuperação'}
                </Btn>
                <button type="button" onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:'var(--txm)', fontFamily:'var(--sans)', padding:'4px 0', textAlign:'center' }}>
                  ← Voltar ao login
                </button>
              </form>
            </>
          )}

          {/* Step: sent */}
          {step === 'sent' && (
            <div className="fadein">
              <div style={{ width:52, height:52, borderRadius:'50%', background:'var(--ok-bg)', border:'2px solid var(--ok-bd)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, marginBottom:20 }}>✉</div>
              <div className="lf-h">Link enviado!</div>
              <div className="lf-sub">Verifique a caixa de entrada de <strong>{email}</strong> e também a pasta de spam.</div>
              <div style={{ background:'var(--ok-bg)', border:'1px solid var(--ok-bd)', borderRadius:'var(--r3)', padding:'12px 14px', fontSize:13, color:'var(--ok)', marginBottom:20, lineHeight:1.6 }}>
                O link expira em <strong>1 hora</strong>. Após clicar, você será redirecionado para criar uma nova senha.
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                <Btn variant="p" size="lg" full onClick={() => setStep('reset')}>Simular: redefinir senha →</Btn>
                <Btn variant="g" full onClick={() => { setStep('request'); setEmail(''); }}>Usar outro e-mail</Btn>
                <Btn variant="g" full onClick={onBack}>Voltar ao login</Btn>
              </div>
            </div>
          )}

          {/* Step: reset */}
          {step === 'reset' && (
            <div className="fadein">
              <div className="lf-h">Nova senha</div>
              <div className="lf-sub">Escolha uma senha forte com pelo menos 8 caracteres.</div>
              <form className="lf-form" onSubmit={handleReset}>
                <div className="field">
                  <label className="flabel">Nova senha</label>
                  <input className="input" type="password" minLength={8} required autoFocus
                    value={pw1} onChange={e => setPw1(e.target.value)} placeholder="Mínimo 8 caracteres" />
                </div>
                <div className="field">
                  <label className="flabel">Confirmar nova senha</label>
                  <input className="input" type="password" required
                    value={pw2} onChange={e => setPw2(e.target.value)} placeholder="Repita a nova senha" />
                </div>
                {err && <div className="lf-err">{err}</div>}
                <Btn variant="p" size="lg" full type="submit" disabled={loading}>
                  {loading ? 'Salvando...' : 'Redefinir senha'}
                </Btn>
              </form>
            </div>
          )}

          {/* Step: done */}
          {step === 'done' && (
            <div className="fadein" style={{ textAlign:'center' }}>
              <div style={{ width:52, height:52, borderRadius:'50%', background:'var(--ok-bg)', border:'2px solid var(--ok-bd)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, margin:'0 auto 20px' }}>✓</div>
              <div className="lf-h" style={{ textAlign:'left' }}>Senha redefinida!</div>
              <div className="lf-sub" style={{ textAlign:'left' }}>Sua nova senha foi salva com sucesso. Faça login para continuar.</div>
              <Btn variant="p" size="lg" full onClick={onBack}>Entrar com a nova senha</Btn>
            </div>
          )}

        </div>
      </div>
    </div>
  );
};

const InviteUserScreen = ({ onBack }) => {
  const [email, setEmail]   = useState('');
  const [role, setRole]     = useState('INSPECTOR');
  const [message, setMessage] = useState('');
  const [sent, setSent]     = useState(false);
  const [loading, setLoading] = useState(false);
  const [invites, setInvites] = useState(MOCK_PENDING_INVITES);

  const handleSend = (e) => {
    e.preventDefault();
    if (!email) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setSent(true);
      setInvites(prev => [...prev, {
        id: `i${Date.now()}`, email, role,
        sent_at: new Date().toISOString().slice(0,10),
        expires_at: new Date(Date.now() + 7*864e5).toISOString().slice(0,10),
      }]);
      setEmail(''); setMessage(''); setSent(true);
      setTimeout(() => setSent(false), 2500);
    }, 700);
  };

  const revokeInvite = (id) => setInvites(prev => prev.filter(i => i.id !== id));

  return (
    <div className="page fadein" data-screen-label="Convidar Usuário">
      <BackHeader
        title="Convidar usuário"
        subtitle="O convidado receberá um e-mail com link de acesso"
        onBack={onBack}
      />

      <div style={{ display: 'grid', gap: 16 }}>

        {/* Invite form */}
        <div className="card card-p">
          <div className="eyebrow mb4">Novo convite</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--tx)', marginBottom: 16 }}>Dados do convite</div>
          <form onSubmit={handleSend} style={{ display: 'grid', gap: 12 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 10, alignItems: 'end' }}>
              <div className="field">
                <label className="flabel">E-mail corporativo</label>
                <input className="input" type="email" required value={email}
                  onChange={e => setEmail(e.target.value)} placeholder="colaborador@empresa.com" />
              </div>
              <div className="field">
                <label className="flabel">Papel</label>
                <select className="input" value={role} onChange={e => setRole(e.target.value)}>
                  {['ADMIN','MANAGER','INSPECTOR','VIEWER'].map(r => (
                    <option key={r} value={r}>{r}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="field">
              <label className="flabel">Mensagem personalizada (opcional)</label>
              <input className="input" type="text" value={message}
                onChange={e => setMessage(e.target.value)}
                placeholder="Ex: Bem-vindo à equipe de auditoria!" />
            </div>

            {/* Role description */}
            <div className="info-box" style={{ fontSize: 12 }}>
              {{
                ADMIN:     'Acesso total: gerencia usuários, formulários e inspeções.',
                MANAGER:   'Gerencia formulários e acompanha inspeções da equipe.',
                INSPECTOR: 'Executa inspeções e registra evidências.',
                VIEWER:    'Visualiza relatórios e inspeções sem poder editar.',
              }[role]}
            </div>

            {sent && <div style={{ fontSize: 13, color: 'var(--ok)', fontWeight: 600 }}>✓ Convite enviado com sucesso!</div>}
            <Btn variant="p" type="submit" disabled={loading}>
              {loading ? 'Enviando...' : 'Enviar convite por e-mail'}
            </Btn>
          </form>
        </div>

        {/* Pending invites */}
        <div>
          <div className="slabel mb10">Convites pendentes ({invites.length})</div>
          {invites.length === 0 ? (
            <div className="empty" style={{ padding: 24 }}>
              <div className="empty-p">Nenhum convite pendente.</div>
            </div>
          ) : (
            <div className="lstack">
              {invites.map(inv => (
                <div key={inv.id} className="card" style={{ padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--tx)', marginBottom: 3 }}>{inv.email}</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <RoleBadge role={inv.role} />
                      <span style={{ fontSize: 11, color: 'var(--txm)' }}>
                        Enviado {fmtDate(inv.sent_at)} · expira {fmtDate(inv.expires_at)}
                      </span>
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                    <Btn variant="s" size="sm">Reenviar</Btn>
                    <Btn variant="d" size="sm" onClick={() => revokeInvite(inv.id)}>Revogar</Btn>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

    <div style={{

// ============================================================
// 1. GLOBAL SEARCH SCREEN
// ============================================================
const GlobalSearchScreen = ({ onBack, onOpenForm, onOpenSubmission }) => {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  useEffect(() => { if(inputRef.current) inputRef.current.focus(); }, []);

  const FORMS = window.MOCK_FORMS || [];
  const SUBS  = window.MOCK_SUBMISSIONS || [];

  const q = query.toLowerCase().trim();
  const matchForms = q ? FORMS.filter(f => f.name.toLowerCase().includes(q) || (f.description||'').toLowerCase().includes(q)) : [];
  const matchSubs  = q ? SUBS.filter(s  => s.form_name.toLowerCase().includes(q)) : [];
  const hasResults = matchForms.length > 0 || matchSubs.length > 0;
  const noResults  = q && !hasResults;

  const RECENT = ['Checklist NR-10','Auditoria ISO 9001','Inspeções concluídas'];

  return (
    <div style={{ minHeight:'100dvh', background:'var(--bg)', display:'flex', flexDirection:'column' }}
      data-screen-label="Busca Global">

      {/* Search header */}
      <div style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', padding:'12px 16px', display:'flex', gap:10, alignItems:'center', position:'sticky', top:0, zIndex:50 }}>
        <button className="back-btn" onClick={onBack}><IcoBack /></button>
        <div className="sbar" style={{ flex:1, margin:0 }}>
          <div className="sbar-ico"><IcoSearch /></div>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Buscar formulários, inspeções..." />
          {query && (
            <button onClick={() => setQuery('')} style={{ border:'none', background:'none', cursor:'pointer', color:'var(--txm)', width:16, height:16, padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <IcoClose />
            </button>
          )}
        </div>
      </div>

      <div style={{ padding:'16px', maxWidth:800, width:'100%', margin:'0 auto' }}>

        {/* Empty state — no query */}
        {!q && (
          <div className="fadein">
            <div className="slabel mb10">Buscas recentes</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {RECENT.map(r => (
                <button key={r} onClick={() => setQuery(r)} style={{
                  display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
                  background:'var(--surface)', border:'1px solid var(--border)',
                  borderRadius:'var(--r3)', cursor:'pointer', textAlign:'left',
                  fontSize:13, color:'var(--tx2)', fontFamily:'var(--sans)', width:'100%',
                  transition:'background .15s',
                }}>
                  <div style={{ width:14, height:14, color:'var(--txm)', flexShrink:0 }}><IcoSearch /></div>
                  {r}
                </button>
              ))}
            </div>

            <div className="slabel mb10 mt20">Acesso rápido</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              {[
                { label:'Inspeções em andamento', count: SUBS.filter(s=>s.status==='in_progress').length, onClick:() => onBack() },
                { label:'Formulários publicados',  count: FORMS.filter(f=>f.status==='published').length, onClick:() => onBack() },
              ].map(item => (
                <div key={item.label} onClick={item.onClick} className="card" style={{ padding:'14px 16px', cursor:'pointer' }}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow='var(--sh1)'}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow=''}>
                  <div style={{ fontSize:22, fontWeight:800, color:'var(--a)', fontVariantNumeric:'tabular-nums' }}>{item.count}</div>
                  <div style={{ fontSize:12, color:'var(--tx2)', marginTop:4 }}>{item.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* No results */}
        {noResults && (
          <div className="empty fadein">
            <div className="empty-icon"><IcoSearch /></div>
            <div className="empty-h">Nenhum resultado para "{query}"</div>
            <div className="empty-p">Tente termos mais genéricos ou verifique a ortografia.</div>
          </div>
        )}

        {/* Results */}
        {hasResults && (
          <div className="fadein">
            {matchForms.length > 0 && (
              <div style={{ marginBottom:20 }}>
                <div className="slabel mb10">Formulários ({matchForms.length})</div>
                <div className="lstack">
                  {matchForms.map(f => (
                    <ListRow key={f.id} title={f.name}
                      sub={'v' + f.version + ' · ' + f.fields_count + ' campos · ' + (f.status === 'published' ? 'Publicado' : 'Rascunho')}
                      right={<FormBadge status={f.status} />}
                      onClick={() => onOpenForm && onOpenForm(f.id)} />
                  ))}
                </div>
              </div>
            )}
            {matchSubs.length > 0 && (
              <div>
                <div className="slabel mb10">Inspeções ({matchSubs.length})</div>
                <div className="lstack">
                  {matchSubs.map(s => (
                    <ListRow key={s.id} title={s.form_name}

                </div>
              </div>
            )}

  );

const NotificationsScreen = ({ onBack }) => {
  const [filter, setFilter] = useState('all');
  const [notifs, setNotifs] = useState(MOCK_NOTIFS);

  const filtered = notifs.filter(n => {
    if (filter === 'unread') return !n.read;
    if (filter === 'warn')   return n.type === 'warn' || n.type === 'err';
    return true;
  });

  const unreadCount = notifs.filter(n => !n.read).length;

  const markAllRead  = () => setNotifs(prev => prev.map(n => ({ ...n, read:true })));
  const markRead     = id  => setNotifs(prev => prev.map(n => n.id === id ? { ...n, read:true } : n));
  const dismiss      = id  => setNotifs(prev => prev.filter(n => n.id !== id));

  const tabs = [
    { id:'all',    label:'Todas',    count: notifs.length },
    { id:'unread', label:'Não lidas', count: unreadCount  },
    { id:'warn',   label:'Alertas'                        },
  ];

  return (
    <div className="page fadein" data-screen-label="Notificações">
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, marginBottom:20, flexWrap:'wrap' }}>
        <BackHeader title="Notificações"

          onBack={onBack} />
        {unreadCount > 0 && (
          <Btn variant="g" size="sm" onClick={markAllRead}>Marcar todas como lidas</Btn>

      {filtered.length === 0 ? (
        <EmptyState title="Nenhuma notificação" desc="Você está em dia com tudo." />

        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>

              padding:'14px 16px', display:'flex', gap:12, alignItems:'flex-start',
              opacity: n.read ? .7 : 1,

              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, marginBottom:2 }}>
                  <div style={{ fontSize:13, fontWeight: n.read ? 500 : 700, color:'var(--tx)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{n.title}</div>
                  <span style={{ fontSize:11, color:'var(--txm)', flexShrink:0 }}>{n.time}</span>
                </div>
                <div style={{ fontSize:12, color:'var(--tx2)', lineHeight:1.5 }}>{n.desc}</div>
                {!n.read && (
                  <button onClick={() => markRead(n.id)} style={{ border:'none', background:'none', cursor:'pointer', fontSize:11, color:'var(--a)', fontFamily:'var(--sans)', padding:'4px 0 0', fontWeight:600 }}>
                    Marcar como lida

                <IcoClose />

            </div>
          ))}

  );

// 4. ERROR SCREEN
// ============================================================
const ErrorScreen = ({ type = '404', onBack, onRetry }) => {
  const configs = {
    '404': {
      emoji: '🔍',
      title: 'Página não encontrada',
      desc:  'O recurso que você procura não existe ou foi removido.',
      action: 'Voltar ao início',
    },
    '500': {
      emoji: '⚠',
      title: 'Erro no servidor',
      desc:  'Ocorreu um erro inesperado. Nossa equipe foi notificada automaticamente.',
      action: 'Tentar novamente',
    },
    'offline': {
      emoji: '📡',
      title: 'Sem conexão',
      desc:  'Verifique sua conexão com a internet e tente novamente. Dados em cache ainda estão disponíveis.',

  return (

        <div style={{ fontSize:56, marginBottom:20, lineHeight:1 }}>{cfg.emoji}</div>

          {type === '404' ? 'Erro 404' : type === '500' ? 'Erro 500' : 'Offline'}
        </div>

        <h1 style={{ fontSize:24, fontWeight:700, letterSpacing:'-.02em', color:'var(--tx)', marginBottom:10 }}>{cfg.title}</h1>
        <p style={{ fontSize:14, color:'var(--tx2)', lineHeight:1.6, marginBottom:28 }}>{cfg.desc}</p>

        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <Btn variant="p" size="lg" full onClick={onRetry || onBack}>{cfg.action}</Btn>
          {onBack && <Btn variant="g" full onClick={onBack}>← Voltar</Btn>}
        </div>

        {type === 'offline' && (
          <div style={{ marginTop:24, padding:'12px 16px', background:'var(--warn-bg)', border:'1px solid var(--warn-bd)', borderRadius:'var(--r3)', fontSize:12, color:'var(--warn)', lineHeight:1.6 }}>
            Dados salvos localmente ainda estão acessíveis. Suas respostas serão sincronizadas quando a conexão for restaurada.
          </div>

        {/* Error type switcher for demo */}
        <div style={{ marginTop:28, paddingTop:20, borderTop:'1px solid var(--border)' }}>
          <div style={{ fontSize:11, color:'var(--txm)', marginBottom:10 }}>Demo — ver outros estados:</div>
          <div style={{ display:'flex', gap:6, justifyContent:'center', flexWrap:'wrap' }}>
            {['404','500','offline'].map(t => (
              <button key={t} onClick={() => window.__saSetErrorType && window.__saSetErrorType(t)}
                style={{
                  border:'1px solid var(--border)', borderRadius:'var(--r2)',
                  padding:'4px 10px', fontSize:11, fontWeight:600,
                  background: type === t ? 'var(--n100)' : 'var(--surface)',
                  color: type === t ? 'var(--tx)' : 'var(--txm)',
                  cursor:'pointer', fontFamily:'var(--sans)',
                }}>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// 5. SPLASH SCREEN
// ============================================================
const SplashScreen = ({ onDone }) => {
  const [step, setStep] = useState(0);
  const steps = ['Conectando ao servidor...','Carregando contexto...','Verificando permissões...','Pronto!'];

  useEffect(() => {
    const timers = steps.map((_, i) =>
      setTimeout(() => setStep(i + 1), (i + 1) * 500)
    );
    const done = setTimeout(onDone, steps.length * 500 + 400);
    return () => { timers.forEach(clearTimeout); clearTimeout(done); };
  }, []);

  const pct = Math.round((step / steps.length) * 100);

  return (
    <div style={{ minHeight:'100dvh', background:'var(--nav)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:0 }}
      data-screen-label="Splash">

      {/* Brand mark */}
      <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:48 }}>
        <div style={{ width:52, height:52, background:'var(--a)', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:22, color:'#fff', boxShadow:'0 8px 24px rgba(37,99,235,.5)' }}>SA</div>
        <div>
          <div style={{ fontSize:22, fontWeight:800, color:'#fff', letterSpacing:'-.01em' }}>Smart Audit</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,.35)', textTransform:'uppercase', letterSpacing:'.1em' }}>Plataforma operacional</div>
        </div>
      </div>

      {/* Progress */}
      <div style={{ width:240 }}>
        <div style={{ height:3, background:'rgba(255,255,255,.1)', borderRadius:99, overflow:'hidden', marginBottom:14 }}>
          <div style={{ height:'100%', background:'var(--a)', borderRadius:99, width: pct + '%', transition:'width .4s ease' }} />
        </div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,.4)', textAlign:'center', minHeight:18 }}>
          {step > 0 && step <= steps.length ? steps[step - 1] : ''}
        </div>
      </div>

      {/* Dots */}
      <div style={{ display:'flex', gap:8, marginTop:40 }}>
        {steps.map((_,i) => (
          <div key={i} style={{
            width:6, height:6, borderRadius:'50%',
            background: i < step ? 'var(--a)' : 'rgba(255,255,255,.15)',
            transition:'background .3s',
          }} />
        ))}
      </div>
    </div>
  );
};

// ============================================================
// EXPORTS
// ============================================================
Object.assign(window, {
  GlobalSearchScreen,
  NotificationsScreen,
  UserHistoryScreen,
  ErrorScreen,
  SplashScreen,
});

</script>

  const [selectedTeam, setSelected]   = useState(null);

  const [memberUserId, setMemberUser] = useState('');
  const [saved, setSaved]             = useState(false);
  const [memberMsg, setMemberMsg]     = useState('');

  // Members state — keyed by team id
  const [membersMap, setMembersMap] = useState(MOCK_TEAM_MEMBERS);

  const selectedMembers = selectedTeam ? (membersMap[selectedTeam.id] || []) : [];

    setMemberMsg('');
    setMemberUser('');

  function openEdit(team) {
    setEditId(team.id);
    setFormName(team.name);
    setSelected(team);
    setMode('edit');
    setSaved(false);
  }

  function openMembers(team) {
    setSelected(team);
    setMode('members');
    setMemberUser('');
    setMemberMsg('');
  }

  function handleSubmitForm(e) {
    e.preventDefault();
    if (mode === 'edit') {
      setTeams(prev => prev.map(t => t.id === editId ? { ...t, name: formName } : t));
    } else {
      const newTeam = { id: 't' + Date.now(), company_id: 'c1', name: formName, member_count: 0 };
      setTeams(prev => [...prev, newTeam]);

    setSaved(true);
    setTimeout(() => { setSaved(false); resetToCreate(); }, 1200);
  }

  function handleDelete(team) {
    if (!window.confirm('Excluir a equipe "' + team.name + '"? Esta ação não pode ser desfeita.')) return;
    setTeams(prev => prev.filter(t => t.id !== team.id));
    resetToCreate();
  }

  function handleAddMember(e) {
    e.preventDefault();
    if (!memberUserId || !selectedTeam) return;
    const user = MOCK_ALL_USERS_FOR_TEAMS.find(u => u.id === memberUserId);
    if (!user) return;
    const newMember = { user_id: user.id, name: user.name, email: user.email };

      ...prev,
      [selectedTeam.id]: [...(prev[selectedTeam.id] || []), newMember],
