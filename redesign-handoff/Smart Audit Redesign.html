    setTeams(prev => prev.map(t => t.id === selectedTeam.id ? { ...t, member_count: t.member_count + 1 } : t));
    setMemberUser('');
    setMemberMsg('Membro adicionado com sucesso.');
    setTimeout(() => setMemberMsg(''), 2000);
  }

  function handleRemoveMember(userId) {
    if (!selectedTeam) return;
    setMembersMap(prev => ({
      ...prev,
      [selectedTeam.id]: (prev[selectedTeam.id] || []).filter(m => m.user_id !== userId),
    }));
    setTeams(prev => prev.map(t => t.id === selectedTeam.id ? { ...t, member_count: Math.max(0, t.member_count - 1) } : t));
    setMemberMsg('Membro removido.');
    setTimeout(() => setMemberMsg(''), 2000);
  }

  const panelTitle  = mode === 'edit' ? 'Editar equipe' : mode === 'members' ? 'Membros da equipe' : 'Nova equipe';
  const panelBadge  = mode === 'edit' ? 'b-warn' : mode === 'members' ? 'b-a' : 'b-ok';
  const panelBadgeTx = mode === 'edit' ? 'Edição' : mode === 'members' ? 'Membros' : 'Criação';

  return (
    <div className="page fadein" data-screen-label="Equipes">
      <SectionHeader
        eyebrow="Administração"
        title="Equipes"
        desc="Organize usuários em equipes operacionais para atribuição de inspeções."
        action={<Btn variant="s" onClick={resetToCreate}>+ Nova equipe</Btn>}
      />

      {/* Stats */}
      <div className="stats-grid mb20">
        <StatCard label="Total de equipes" value={teams.length} />
        <StatCard label="Total de membros" value={teams.reduce((a,t)=>a+t.member_count,0)} />
        <StatCard label="Maior equipe" value={Math.max(...teams.map(t=>t.member_count))} desc="membros" />
        <StatCard label="Usuários disponíveis" value={MOCK_ALL_USERS_FOR_TEAMS.length} />
      </div>

      {/* Main layout */}
      <div className="users-layout">

        {/* Side panel */}
        <div className="card card-p" style={{ alignSelf: 'flex-start', position: 'sticky', top: 20 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
            <div>
              <div className="eyebrow">{mode === 'members' && selectedTeam ? selectedTeam.name : 'Operação'}</div>
              <div style={{ fontSize:16, fontWeight:700, color:'var(--tx)' }}>{panelTitle}</div>
            </div>
            <span className={'badge ' + panelBadge}>{panelBadgeTx}</span>
          </div>

          {/* Create / Edit form */}
          {mode !== 'members' && (
            <form onSubmit={handleSubmitForm} style={{ display:'grid', gap:12 }}>
              <div className="field">
                <label className="flabel">Nome da equipe</label>
                <input className="input" required minLength={1} maxLength={150}
                  value={formName} onChange={e => setFormName(e.target.value)}
                  placeholder="Ex: Auditoria Norte" />
              </div>
              {saved && <div style={{ fontSize:13, color:'var(--ok)', fontWeight:600 }}>✓ Equipe salva!</div>}
              <Btn variant="p" type="submit" full>
                {mode === 'edit' ? 'Salvar alterações' : 'Criar equipe'}
              </Btn>
              {mode === 'edit' && <Btn variant="g" full onClick={resetToCreate}>Cancelar edição</Btn>}
            </form>
          )}

          {/* Members panel */}
          {mode === 'members' && selectedTeam && (
            <div style={{ display:'grid', gap:14 }}>
              <div style={{ fontSize:13, color:'var(--txm)' }}>
                {selectedMembers.length} membro{selectedMembers.length !== 1 ? 's' : ''} nesta equipe
              </div>

              {/* Add member form */}
              {availableUsers.length > 0 ? (
                <form onSubmit={handleAddMember} style={{ display:'grid', gap:10 }}>
                  <div className="field">
                    <label className="flabel">Adicionar membro</label>
                    <select className="input" value={memberUserId} onChange={e => setMemberUser(e.target.value)} required>
                      <option value="">Selecione um usuário</option>
                      {availableUsers.map(u => (
                        <option key={u.id} value={u.id}>{u.name} ({u.role})</option>
                      ))}
                    </select>
                  </div>
                  <Btn variant="p" type="submit" full disabled={!memberUserId}>Adicionar</Btn>
                </form>
              ) : (
                <div className="info-box" style={{ fontSize:12 }}>Todos os usuários já são membros desta equipe.</div>
              )}

              {memberMsg && (
                <div style={{ fontSize:13, color:'var(--ok)', fontWeight:600 }}>{memberMsg}</div>
              )}

              {/* Members list */}
              {selectedMembers.length > 0 && (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {selectedMembers.map(m => (
                    <div key={m.user_id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px', background:'var(--n50)', border:'1px solid var(--border)', borderRadius:'var(--r3)' }}>
                      <div style={{ width:28, height:28, borderRadius:'50%', background:'var(--a-lt)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:800, color:'var(--a)', flexShrink:0 }}>
                        {m.name.split(' ').map(n=>n[0]).slice(0,2).join('')}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:'var(--tx)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.name}</div>
                        <div style={{ fontSize:11, color:'var(--txm)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.email}</div>
                      </div>
                      <button onClick={() => handleRemoveMember(m.user_id)} style={{ border:'none', background:'none', cursor:'pointer', fontSize:11, color:'var(--err)', fontWeight:600, fontFamily:'var(--sans)', flexShrink:0 }}>
                        Remover
                      </button>
                    </div>
                  ))}
                </div>
              )}
              {selectedMembers.length === 0 && (
                <div style={{ fontSize:13, color:'var(--txm)' }}>Nenhum membro nesta equipe.</div>
              )}

              <Btn variant="g" full onClick={resetToCreate}>← Voltar</Btn>
            </div>
          )}
        </div>

        {/* Teams list */}
        <div>
          {/* Mobile cards */}
          <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:8 }} className="lg-hide">
            {teams.map(t => (
              <div key={t.id} className="card card-p">
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginBottom:10 }}>
                  <div>
                    <div className="eyebrow">Equipe</div>
                    <div style={{ fontSize:15, fontWeight:700, color:'var(--tx)', marginTop:4 }}>{t.name}</div>
                  </div>
                  <span className="badge b-a">{t.member_count} membro{t.member_count !== 1 ? 's' : ''}</span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                  <Btn variant="s" size="sm" full onClick={() => openMembers(t)}>Gerenciar membros</Btn>
                  <Btn variant="g" size="sm" full onClick={() => openEdit(t)}>Editar</Btn>
                  <Btn variant="d" size="sm" full onClick={() => handleDelete(t)}>Excluir</Btn>
                </div>
              </div>
            ))}
          </div>

          {/* Desktop table */}
          <div className="card" style={{ overflowX:'auto' }}>
            <table className="tbl">
              <thead>
                <tr>
                  <th>Nome da equipe</th>
                  <th>Membros</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                {teams.map(t => (
                  <tr key={t.id}>
                    <td className="tbl-name">{t.name}</td>
                    <td>
                      <span className="badge b-a">{t.member_count} membro{t.member_count !== 1 ? 's' : ''}</span>
                    </td>
                    <td>
                      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                        <Btn variant="s" size="sm" onClick={() => openMembers(t)}>Membros</Btn>
                        <Btn variant="g" size="sm" onClick={() => openEdit(t)}>Editar</Btn>
                        <Btn variant="d" size="sm" onClick={() => handleDelete(t)}>Excluir</Btn>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// EXPORTS
// ============================================================
Object.assign(window, {
  IcoTeams,
  TeamsScreen,
  MOCK_TEAMS_LIST,
  MOCK_TEAM_MEMBERS,
});

</script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Tweak defaults ───────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2563eb",
  "density": "comfortable",
  "navStyle": "dark"
}/*EDITMODE-END*/;

const ACCENTS = [
  { color:'#2563eb', dark:'#1d4ed8', light:'#eff6ff', border:'#bfdbfe', label:'Azul'    },
  { color:'#0d9488', dark:'#0f766e', light:'#f0fdfa', border:'#99f6e4', label:'Teal'    },
  { color:'#7c3aed', dark:'#6d28d9', light:'#faf5ff', border:'#ddd6fe', label:'Violeta' },
  { color:'#c2410c', dark:'#9a3412', light:'#fff7ed', border:'#fed7aa', label:'Âmbar'   },
];

function applyAccent(a) {
  const r = document.documentElement.style;
  r.setProperty('--a',    a.color);
  r.setProperty('--a-dk', a.dark);
  r.setProperty('--a-lt', a.light);
  r.setProperty('--a-bd', a.border);
}

// ── Screen labels ────────────────────────────────────────────
const MOB_TITLES = {
  login:                'Smart Audit',
  splash:               'Smart Audit',
  'forgot-password':    'Recuperar acesso',
  'company-select':     'Selecionar empresa',
  dashboard:            'Resumo',
  forms:                'Formulários',
  'form-detail':        'Formulário',
  'form-version-history':'Histórico',
  submissions:          'Inspeções',
  'submission-detail':  'Inspeção',
  'inspection-report':  'Relatório',
  teams:                'Equipes',
  users:                'Usuários',
  'user-history':       'Histórico',
  'invite-user':        'Convidar usuário',
  'company-settings':   'Configurações',
  profile:              'Meu perfil',
  search:               'Buscar',
  notifications:        'Notificações',
  error:                'Erro',
};

const SHELL_SCREENS = new Set([
  'dashboard','forms','form-detail','form-version-history',
  'submissions','submission-detail','inspection-report',
  'teams',
  'users','user-history','invite-user','company-settings',
  'profile','notifications',
]);

const NAV_ACTIVE = {
  'form-detail':          'forms',
  'form-version-history': 'forms',
  'submission-detail':    'submissions',
  'inspection-report':    'submissions',
  'invite-user':          'users',
  'user-history':         'users',
  'company-settings':     'dashboard',
  'profile':              'dashboard',
  'notifications':        'dashboard',
};

// ── Tweaks Panel ─────────────────────────────────────────────
const TweaksPanel = ({ tweaks, setTweak, onClose }) => {
  const current = ACCENTS.find(a => a.color === tweaks.accent) || ACCENTS[0];
  return (
    <div className="tweaks-panel fadein">
      <div className="tweaks-header">
        <span>Tweaks</span>
        <button onClick={onClose} style={{ border:'none', background:'none', cursor:'pointer', color:'var(--txm)', width:20, height:20, padding:0 }}>
          <IcoClose />
        </button>
      </div>
      <div className="tweaks-body">
        <div>
          <div className="tweak-label">Cor de destaque — {current.label}</div>
          <div className="tweak-swatches">
            {ACCENTS.map(a => (
              <button key={a.color} className={'tweak-swatch' + (tweaks.accent === a.color ? ' selected' : '')}
                style={{ background: a.color }} title={a.label}
                onClick={() => setTweak('accent', a.color)} />
            ))}
          </div>
        </div>
        <div>
          <div className="tweak-label">Densidade</div>
          <div className="tweak-segs">
            {[['comfortable','Confortável'],['compact','Compacto']].map(function(p){
              return <button key={p[0]} className={'tweak-seg' + (tweaks.density === p[0] ? ' active' : '')} onClick={() => setTweak('density', p[0])}>{p[1]}</button>;
            })}
          </div>
        </div>
        <div>
          <div className="tweak-label">Sidebar</div>
          <div className="tweak-segs">
            {[['dark','Escura'],['slate','Slate']].map(function(p){
              return <button key={p[0]} className={'tweak-seg' + (tweaks.navStyle === p[0] ? ' active' : '')} onClick={() => setTweak('navStyle', p[0])}>{p[1]}</button>;
            })}
          </div>
        </div>
        <div style={{ borderTop:'1px solid var(--border)', paddingTop:10, fontSize:11, color:'var(--txm)', lineHeight:1.8 }}>
          <strong style={{ color:'var(--tx2)', display:'block', marginBottom:4 }}>19 telas disponíveis</strong>
          Splash · Login · Recuperar senha · Sel. Empresa · Dashboard · Formulários · Detalhe Form · Histórico Versões ·
          Inspeções · Detalhe Inspeção · Relatório · Usuários · Histórico Usuário · Convidar · Config. Empresa · Perfil ·
          Busca · Notificações · Erro (404/500/offline)
        </div>
      </div>
    </div>
  );
};

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [screen, setScreen]         = useState('splash');
  const [history, setHistory]       = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [errorType, setErrorType]   = useState('404');
  const [tweaks, setTweaksState]    = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  // Expose error type setter for demo buttons
  useEffect(() => {
    window.__saSetErrorType = (t) => { setErrorType(t); setScreen('error'); };
    return () => { delete window.__saSetErrorType; };
  }, []);

  // Apply tweaks
  useEffect(() => {
    const a = ACCENTS.find(x => x.color === tweaks.accent) || ACCENTS[0];
    applyAccent(a);
    document.body.classList.toggle('compact', tweaks.density === 'compact');
    document.documentElement.style.setProperty('--nav', tweaks.navStyle === 'slate' ? '#334155' : '#1e293b');
  }, [tweaks]);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data && e.data.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data && e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Report opener
  useEffect(() => {
    window.__saOpenReport = (id) => goTo('inspection-report', id);
    return () => { delete window.__saOpenReport; };
  }, [screen]);

  const setTweak = (key, val) => {
    setTweaksState(prev => {
      const next = Object.assign({}, prev, { [key]: val });
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]: val } }, '*');
      return next;
    });
  };

  const goTo = (s, id) => {
    setHistory(prev => [...prev, { screen: screen, selectedId: selectedId }]);
    setScreen(s);
    if (id !== undefined && id !== null) setSelectedId(id);
  };

  const goBack = () => {
    if (history.length > 0) {
      const prev = history[history.length - 1];
      setHistory(function(h){ return h.slice(0, -1); });
      setScreen(prev.screen);
      setSelectedId(prev.selectedId);
    } else {
      setScreen('dashboard');
    }
  };

  const handleNav    = (id) => { setScreen(id); setSelectedId(null); setHistory([]); };
  const handleLogout = ()   => { setScreen('login'); setSelectedId(null); setHistory([]); };

  // Unread notifications count (mock)
  const unreadCount = 3;

  const renderScreen = () => {
    switch (screen) {

      case 'splash':
        return <SplashScreen onDone={() => setScreen('login')} />;

      case 'login':
        return <LoginScreen
          onLogin={() => goTo('company-select')}
          onForgotPassword={() => goTo('forgot-password')}
        />;

      case 'forgot-password':
        return <ForgotPasswordScreen onBack={goBack} />;

      case 'company-select':
        return <CompanySelectScreen onSelect={() => goTo('dashboard')} onLogout={handleLogout} />;

      case 'dashboard':
        return <DashboardScreen onOpenSubmission={id => goTo('submission-detail', id)} />;

      case 'forms':
        return <FormsScreen onOpenForm={id => goTo('form-detail', id)} />;

      case 'form-detail':
        return <FormDetailScreen
          formId={selectedId}
          onBack={goBack}
          onOpenHistory={() => goTo('form-version-history', selectedId)}
          onNewVersion={goBack}
        />;

      case 'form-version-history':
        return <FormVersionHistoryScreen formId={selectedId} onBack={goBack} />;

      case 'submissions':
        return <SubmissionsScreen onOpenSubmission={id => goTo('submission-detail', id)} />;

      case 'submission-detail':
        return <SubmissionDetailScreen submissionId={selectedId} onBack={goBack} />;

      case 'inspection-report':
        return <InspectionReportScreen submissionId={selectedId} onBack={goBack} />;

      case 'users':
        return <UsersScreen
          onInvite={() => goTo('invite-user')}
          onOpenHistory={id => goTo('user-history', id)}
        />;

      case 'teams':
        return <TeamsScreen />;

      case 'user-history':
        return <UserHistoryScreen
          userId={selectedId}
          onBack={goBack}
          onOpenSubmission={id => goTo('submission-detail', id)}
        />;

      case 'invite-user':
        return <InviteUserScreen onBack={goBack} />;

      case 'company-settings':
        return <CompanySettingsScreen onBack={goBack} />;

      case 'profile':
        return <ProfileScreen onBack={goBack} />;

      case 'search':
        return <GlobalSearchScreen
          onBack={goBack}
          onOpenForm={id => goTo('form-detail', id)}
          onOpenSubmission={id => goTo('submission-detail', id)}
        />;

      case 'notifications':
        return <NotificationsScreen onBack={goBack} />;

      case 'error':
        return <ErrorScreen type={errorType} onBack={() => setScreen('dashboard')} onRetry={() => setScreen('dashboard')} />;

      default:
        return <DashboardScreen onOpenSubmission={id => goTo('submission-detail', id)} />;
    }
  };

  const tweaksEl = showTweaks && (
    <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => {
      setShowTweaks(false);
      window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*');
    }} />
  );

  const noShell = ['splash','login','forgot-password','company-select','search','error'];
  const isShell = !noShell.includes(screen);
  const activeNav = NAV_ACTIVE[screen] || screen;

  if (!isShell) {
    return (
      <React.Fragment>
        {renderScreen()}
        {tweaksEl}
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <AppShell
        activeNav={activeNav}
        onNav={handleNav}
        onLogout={handleLogout}
        onProfile={() => goTo('profile')}
        onCompany={() => goTo('company-select')}
        onSettings={() => goTo('company-settings')}
        onSearch={() => goTo('search')}
        onNotifs={() => goTo('notifications')}
        unreadCount={unreadCount}
        mobTitle={MOB_TITLES[screen] || 'Smart Audit'}
      >
        {renderScreen()}
      </AppShell>
      {tweaksEl}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</body>
</html>
