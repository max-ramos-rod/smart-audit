<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Builder Redesign — Smart Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --sa-bg:        #f1f5f9;
  --sa-panel:     #ffffff;
  --sa-text:      #0f172a;
  --sa-muted:     #64748b;
  --sa-line:      #e2e8f0;
  --sa-brand:     #2563eb;
  --sa-brand-s:   #1d4ed8;
  --sa-brand-soft:#eff6ff;
  --sa-danger:    #dc2626;
  --sa-ok:        #16a34a;
  --sa-warn:      #d97706;
  --sa-nav:       #1e293b;
  --sb-w:         248px;
  --hdr-h:        56px;
  --bnav-h:       64px;
  --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: var(--sans); font-size: 15px; -webkit-font-smoothing: antialiased; }
body { background: var(--sa-bg); color: var(--sa-text); }

/* ══ MOBILE-FIRST APP SHELL ══ */
.app-root { display: flex; flex-direction: column; min-height: 100dvh; }
.app-body  { flex: 1; display: flex; flex-direction: column; padding-bottom: var(--bnav-h); min-height: 0; overflow: hidden; }

/* ── MOBILE HEADER ── */
.mob-hdr {
  display: flex; align-items: center; height: var(--hdr-h);
  padding: 0 16px; background: #fff; border-bottom: 1px solid var(--sa-line);
  position: sticky; top: 0; z-index: 50; gap: 12px; flex-shrink: 0;
}
.mob-mark { width: 26px; height: 26px; background: var(--sa-brand); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; color: #fff; flex-shrink: 0; }
.mob-name { font-size: 14px; font-weight: 700; color: var(--sa-text); }
.mob-av   { width: 30px; height: 30px; border-radius: 50%; background: var(--sa-brand-soft); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--sa-brand); margin-left: auto; flex-shrink: 0; }

/* ── BOTTOM NAV (mobile) ── */
.bot-nav {
  display: flex; height: var(--bnav-h); background: #fff;
  border-top: 1px solid var(--sa-line);
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
}
.bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #94a3b8; border: none; background: none; cursor: pointer; font-family: inherit; padding: 8px 4px; }
.bn-item.active { color: var(--sa-brand); }

/* ── SIDEBAR (desktop only) ── */
.sidebar { display: none; }

/* ── DESKTOP OVERRIDES ── */
@media (min-width: 768px) {
  body { height: 100vh; overflow: hidden; }
  .app-root { flex-direction: row; height: 100vh; overflow: hidden; }
  .app-body  { margin-left: var(--sb-w); padding-bottom: 0; height: 100vh; }
  .mob-hdr { display: none; }
  .bot-nav { display: none; }

  .sidebar {
    display: flex; flex-direction: column;
    width: var(--sb-w); background: var(--sa-nav);
    position: fixed; inset: 0 auto 0 0; z-index: 100; flex-shrink: 0;
  }
  .sb-top { padding: 18px 14px 14px; border-bottom: 1px solid rgba(255,255,255,.07); }
  .sb-logo { display: flex; align-items: center; gap: 10px; }
  .sb-mark { width: 32px; height: 32px; background: var(--sa-brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #fff; flex-shrink: 0; }
  .sb-name { font-size: 14px; font-weight: 700; color: #fff; }
  .sb-sub  { font-size: 9px; color: rgba(255,255,255,.28); text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }
  .sb-nav  { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
  .sb-sec  { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.2); padding: 12px 8px 5px; }
  .nav-btn { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; color: rgba(255,255,255,.42); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; font-family: inherit; width: 100%; text-align: left; transition: color .15s, background .15s; }
  .nav-btn:hover  { color: rgba(255,255,255,.72); background: rgba(255,255,255,.05); }
  .nav-btn.active { color: #fff; background: rgba(37,99,235,.28); }
  .sb-bottom { padding: 10px; border-top: 1px solid rgba(255,255,255,.07); }
  .sb-co { padding: 6px 10px 8px; border-radius: 6px; }
  .sb-co-lbl  { font-size: 9px; font-weight: 600; color: rgba(255,255,255,.22); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
  .sb-co-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.6); }
  .sb-user  { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; }
  .sb-av    { width: 28px; height: 28px; border-radius: 50%; background: rgba(37,99,235,.45); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .sb-uname { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.58); }
}

/* ── BUTTONS ── */
.btn-p { display: inline-flex; align-items: center; gap: 5px; background: var(--sa-brand); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; white-space: nowrap; }
.btn-p:hover { background: var(--sa-brand-s); }
.btn-s { display: inline-flex; align-items: center; gap: 5px; background: #fff; color: var(--sa-text); border: 1px solid var(--sa-line); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; white-space: nowrap; }
.btn-s:hover { background: var(--sa-bg); }
.btn-sm { font-size: 12px; padding: 5px 10px; }
.btn-ghost { display: inline-flex; align-items: center; gap: 5px; background: none; border: none; color: var(--sa-muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 5px 8px; border-radius: 6px; transition: background .15s, color .15s; }
.btn-ghost:hover { background: var(--sa-bg); color: var(--sa-text); }
.btn-danger { display: inline-flex; align-items: center; gap: 5px; background: none; border: none; color: var(--sa-danger); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 5px 8px; border-radius: 6px; }
.btn-danger:hover { background: #fef2f2; }

/* ── TOP BAR ── */
.topbar {
  background: #fff; border-bottom: 1px solid var(--sa-line);
  padding: 0 16px; height: 52px;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.tb-back { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 7px; background: #fff; border: 1px solid var(--sa-line); cursor: pointer; color: var(--sa-muted); font-size: 14px; flex-shrink: 0; }
.tb-name { font-size: 14px; font-weight: 700; color: var(--sa-text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ver-badge { font-family: var(--mono); font-size: 11px; color: var(--sa-muted); background: #f1f5f9; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--sa-line); flex-shrink: 0; }
.draft-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 3px 7px; border-radius: 99px; background: #f1f5f9; color: #64748b; flex-shrink: 0; }
.draft-chip::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #94a3b8; }
.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }

@media (min-width: 768px) {
  .topbar { padding: 0 20px; height: 56px; gap: 10px; }
  .tb-name { font-size: 15px; }
}

/* ── TOOLBAR ── */
.toolbar {
  background: #fff; border-bottom: 1px solid var(--sa-line);
  padding: 8px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.toolbar::-webkit-scrollbar { display: none; }
.sbar { display: flex; align-items: center; gap: 7px; background: var(--sa-bg); border: 1px solid var(--sa-line); border-radius: 8px; padding: 7px 11px; flex: 1; min-width: 160px; }
.sbar:focus-within { border-color: var(--sa-brand); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.sbar input { border: none; background: none; outline: none; font-size: 13px; color: var(--sa-text); font-family: inherit; flex: 1; min-width: 0; }
.sbar input::placeholder { color: var(--sa-muted); }
.fc-lbl { font-size: 12px; color: var(--sa-muted); white-space: nowrap; font-family: var(--mono); flex-shrink: 0; }

@media (min-width: 768px) {
  .toolbar { padding: 8px 20px; overflow-x: visible; }
  .sbar { max-width: 300px; }
}

/* ── SECTION CHIPS (mobile nav) ── */
.sec-chips-bar {
  background: #fff; border-bottom: 1px solid var(--sa-line);
  padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
  -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
}
.sec-chips-bar::-webkit-scrollbar { display: none; }
.sec-chip { padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--sa-line); background: #fff; color: var(--sa-muted); font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: all .15s; scroll-snap-align: start; }
.sec-chip.active { border-color: var(--sa-brand); background: var(--sa-brand-soft); color: var(--sa-brand); }

/* hide on desktop (replaced by outline panel) */
@media (min-width: 768px) { .sec-chips-bar { display: none; } }

/* ── BULK BAR ── */
.bulk-bar { background: var(--sa-brand-soft); border-bottom: 1px solid #bfdbfe; padding: 8px 16px; display: none; align-items: center; gap: 8px; flex-shrink: 0; overflow-x: auto; }
.bulk-bar.on { display: flex; }
.bulk-info { font-size: 13px; font-weight: 600; color: var(--sa-brand); white-space: nowrap; }

/* ── EDITOR ── */
.editor { flex: 1; display: flex; min-height: 0; overflow: hidden; }

/* ── OUTLINE (desktop) ── */
.outline { display: none; }
@media (min-width: 768px) {
  .outline { display: flex; flex-direction: column; width: 216px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--sa-line); overflow: hidden; }
  .ol-hdr  { padding: 10px 14px 8px; font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--sa-muted); border-bottom: 1px solid var(--sa-line); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .ol-list { flex: 1; overflow-y: auto; padding: 6px; }
  .ol-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--sa-muted); transition: background .15s, color .15s; position: relative; border: none; background: none; font-family: inherit; width: 100%; text-align: left; }
  .ol-item:hover  { background: var(--sa-bg); color: var(--sa-text); }
  .ol-item.active { background: var(--sa-brand-soft); color: var(--sa-brand); font-weight: 700; }
  .ol-item.active::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 4px; width: 3px; background: var(--sa-brand); border-radius: 0 2px 2px 0; }
  .ol-cnt { margin-left: auto; font-size: 10px; font-weight: 700; background: var(--sa-bg); padding: 1px 7px; border-radius: 99px; color: var(--sa-muted); flex-shrink: 0; }
  .ol-item.active .ol-cnt { background: rgba(37,99,235,.1); color: var(--sa-brand); }
  .ol-add { padding: 6px; flex-shrink: 0; border-top: 1px solid var(--sa-line); }
  .ol-add button { width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; border: 1px dashed var(--sa-line); border-radius: 8px; background: none; font-size: 12px; font-weight: 600; color: var(--sa-muted); cursor: pointer; font-family: inherit; transition: border-color .15s, color .15s; }
  .ol-add button:hover { border-color: var(--sa-brand); color: var(--sa-brand); }
}

/* ── FIELD LIST ── */
.fields-pane  { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.fields-inner { }

/* ── SECTION GROUP ── */
.sec-hdr {
  position: sticky; top: 0; z-index: 10;
  background: var(--sa-bg); border-top: 1px solid var(--sa-line); border-bottom: 1px solid var(--sa-line);
  padding: 7px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
}
.sec-toggle { font-size: 11px; color: var(--sa-muted); transition: transform .2s; flex-shrink: 0; }
.sec-toggle.coll { transform: rotate(-90deg); }
.sec-name   { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--sa-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sec-count  { font-size: 10px; font-weight: 700; color: var(--sa-muted); background: var(--sa-line); padding: 2px 8px; border-radius: 99px; flex-shrink: 0; }
.sec-acts   { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
.sec-hdr:hover .sec-acts { opacity: 1; }
.sec-act    { padding: 3px 7px; border-radius: 5px; font-size: 11px; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--sa-muted); font-family: inherit; }
.sec-act:hover { background: var(--sa-line); color: var(--sa-text); }

/* ── FIELD ROW ── */
.frows { background: #fff; }
.f-wrap {}
.f-wrap.hidden { display: none; }

.f-row {
  display: flex; align-items: center; padding: 0 12px 0 12px;
  min-height: 48px; border-bottom: 1px solid var(--sa-line);
  cursor: pointer; transition: background .1s; user-select: none;
  gap: 0;
}
.f-row:hover    { background: #f8fafc; }
.f-row.expanded { background: #eff6ff; border-bottom-color: transparent; }

/* Mobile: bigger touch targets */
@media (max-width: 767px) {
  .f-row { min-height: 52px; }
}

.f-drag { color: #cbd5e1; font-size: 16px; cursor: grab; flex-shrink: 0; width: 18px; display: flex; align-items: center; justify-content: center; margin-right: 6px; }
.f-num  { font-family: var(--mono); font-size: 11px; color: #94a3b8; width: 24px; text-align: right; flex-shrink: 0; margin-right: 8px; }
.f-type { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; width: 46px; text-align: center; margin-right: 10px; }
.f-type.boolean { background: #eff6ff; color: #2563eb; }
.f-type.text    { background: #f1f5f9; color: #475569; }
.f-type.number  { background: #f0fdf4; color: #15803d; }
.f-type.select  { background: #faf5ff; color: #7c3aed; }
.f-type.date    { background: #fffbeb; color: #b45309; }
.f-lbl  { flex: 1; min-width: 0; font-size: 13px; font-weight: 500; color: var(--sa-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
.f-key  { font-family: var(--mono); font-size: 11px; color: var(--sa-muted); background: #f1f5f9; padding: 2px 6px; border-radius: 4px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; margin-right: 6px; }
/* hide key label on small mobile */
@media (max-width: 500px) { .f-key { display: none; } }

.f-req  { width: 12px; flex-shrink: 0; margin-right: 6px; display: flex; align-items: center; justify-content: center; }
.f-rdot { width: 6px; height: 6px; border-radius: 50%; background: var(--sa-danger); }
.f-wt   { font-family: var(--mono); font-size: 11px; color: #94a3b8; width: 28px; text-align: right; flex-shrink: 0; margin-right: 4px; }
.f-vi   { font-size: 10px; color: #a78bfa; flex-shrink: 0; margin-right: 3px; width: 12px; text-align: center; }
.f-arr  { font-size: 13px; color: var(--sa-muted); flex-shrink: 0; transition: transform .2s; width: 18px; text-align: center; }
.f-row.expanded .f-arr { transform: rotate(90deg); }

.f-chk { width: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.f-chk input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--sa-brand); }

/* Section divider row */
.sec-divider-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  background: var(--sa-bg); border-bottom: 1px solid var(--sa-line);
}
.sec-divider-row::before, .sec-divider-row::after {
  content: ''; flex: 1; border-top: 1px solid var(--sa-line);
}
.sec-divider-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; color: var(--sa-muted); white-space: nowrap; }

/* ── CONFIG PANEL ── */
.f-cfg { background: #f8fafc; border-bottom: 1px solid #bfdbfe; padding: 14px 16px; display: none; }
.f-cfg.open { display: block; }

/* Desktop: indent config */
@media (min-width: 768px) {
  .f-cfg { padding: 14px 16px 14px 88px; }
}

.cfg-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cfg-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--sa-brand); }
.cfg-acts  { display: flex; gap: 4px; }

/* Mobile: single col; desktop: 2/3 col grid */
.cfg-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 480px) { .cfg-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 768px) { .cfg-grid { grid-template-columns: 1fr 1fr 1fr; } }
.cfg-full { grid-column: 1 / -1; }
.cfg-2    { grid-column: span 2; }

.flbl   { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--sa-muted); margin-bottom: 4px; }
.finput { width: 100%; background: #fff; border: 1px solid var(--sa-line); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: var(--sa-text); outline: none; font-family: inherit; }
.finput:focus  { border-color: var(--sa-brand); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
.fselect { width: 100%; background: #fff; border: 1px solid var(--sa-line); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: var(--sa-text); outline: none; font-family: inherit; cursor: pointer; }
.ftarea  { width: 100%; background: #fff; border: 1px solid var(--sa-line); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: var(--sa-text); outline: none; font-family: inherit; resize: vertical; min-height: 52px; }
.vi-row  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.vi-lbl  { font-size: 11px; color: var(--sa-muted); white-space: nowrap; }
.vi-hint { font-size: 11px; color: var(--sa-muted); font-style: italic; }

/* ── ADD ROW ── */
.add-row { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--sa-line); background: #fff; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.add-row::-webkit-scrollbar { display: none; }
.add-main { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border: 1px dashed var(--sa-line); border-radius: 8px; background: none; font-size: 12px; font-weight: 600; color: var(--sa-muted); cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: border-color .15s, color .15s; }
.add-main:hover { border-color: var(--sa-brand); color: var(--sa-brand); }
.tchips { display: flex; gap: 4px; flex-shrink: 0; }
.tchip  { padding: 5px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid var(--sa-line); background: #fff; color: var(--sa-muted); font-family: var(--mono); transition: all .15s; white-space: nowrap; flex-shrink: 0; }
.tchip:hover { border-color: var(--sa-brand); color: var(--sa-brand); background: var(--sa-brand-soft); }

/* ── SCROLLBAR ── */
.fields-pane::-webkit-scrollbar { width: 4px; }
.fields-pane::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
.ol-list::-webkit-scrollbar { width: 4px; }
.ol-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
</style>
</head>
<body>
<div class="app-root">

  <!-- ══ SIDEBAR (desktop) ══ -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">
        <div class="sb-mark">SA</div>
        <div><div class="sb-name">Smart Audit</div><div class="sb-sub">Plataforma operacional</div></div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">Principal</div>
      <button class="nav-btn">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Resumo
      </button>
      <button class="nav-btn active">

  <!-- ══ APP BODY ══ -->
  <div class="app-body">

    </button>

      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Inspeções

    </button>
    <button class="bn-item">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuários

<script>
// ── FIELD TYPES (reais: sem photo/evidence) ──
const TLBL  = { boolean:'S/N', text:'TXT', number:'NUM', select:'SEL', date:'DAT' };
const TNAME = { boolean:'Sim/Não', text:'Texto', number:'Número', select:'Seleção', date:'Data' };

const SECS = [
  { id:'epi',       lbl:'Equipamentos de Proteção Individual' },
  { id:'estrutura', lbl:'Verificação de Estrutura' },
  { id:'ambiental', lbl:'Condições Ambientais' },
  { id:'docs',      lbl:'Documentação e Treinamento' },
];

let FIELDS = [
  { id: 1, sec:'epi',       type:'boolean', lbl:'Capacete de proteção em uso e bom estado',         key:'capacete_uso',         req:true,  w:2.0, na:false },
  { id: 2, sec:'epi',       type:'boolean', lbl:'Cinto de segurança tipo paraquedista',             key:'cinto_paraquedista',   req:true,  w:3.0, na:false },
  { id: 3, sec:'epi',       type:'boolean', lbl:'Talabarte duplo devidamente conectado',            key:'talabarte_duplo',      req:true,  w:3.0, na:false },
  { id: 4, sec:'epi',       type:'boolean', lbl:'Luvas de proteção em bom estado',                 key:'luvas_protecao',       req:false, w:1.0, na:true  },
  { id: 5, sec:'epi',       type:'boolean', lbl:'Calçado de segurança com biqueira de aço',        key:'calcado_seguranca',    req:true,  w:1.5, na:false },
  { id: 6, sec:'epi',       type:'boolean', lbl:'Óculos de proteção quando necessário',            key:'oculos_protecao',      req:false, w:1.0, na:true,  vi:{field:'area_quimica',op:'eq',val:'Sim'} },
  { id: 7, sec:'epi',       type:'select',  lbl:'Condição geral dos EPIs',                         key:'epi_condicao',         req:true,  opts:['Ótimo','Bom','Regular','Inadequado'] },
  { id: 8, sec:'epi',       type:'text',    lbl:'Observações sobre os EPIs',                       key:'obs_epis',             req:false },
  { id: 9, sec:'estrutura', type:'boolean', lbl:'Andaime devidamente travado e nivelado',          key:'andaime_travado',      req:true,  w:3.0, na:false },
  { id:10, sec:'estrutura', type:'boolean', lbl:'Guarda-corpos instalados em todo o perímetro',   key:'guarda_corpo',         req:true,  w:2.5, na:false },
  { id:11, sec:'estrutura', type:'boolean', lbl:'Pranchas de trabalho sem danos visíveis',        key:'pranchas_integras',    req:true,  w:2.0, na:false },
  { id:12, sec:'estrutura', type:'boolean', lbl:'Área abaixo devidamente sinalizada',             key:'area_sinalizada',      req:true,  w:1.5, na:false },
  { id:13, sec:'estrutura', type:'number',  lbl:'Altura máxima de trabalho (metros)',             key:'altura_maxima',        req:true  },
  { id:14, sec:'estrutura', type:'text',    lbl:'Observações sobre a estrutura',                  key:'obs_estrutura',        req:false },
  { id:15, sec:'ambiental', type:'boolean', lbl:'Condições climáticas favoráveis para o trabalho',key:'clima_favoravel',      req:true,  w:2.0, na:false },
  { id:16, sec:'ambiental', type:'select',  lbl:'Velocidade do vento estimada',                   key:'vento',                req:true,  opts:['Sem vento','Brisa leve','Moderado','Forte — suspender'] },
  { id:17, sec:'ambiental', type:'boolean', lbl:'Iluminação adequada no local',                   key:'iluminacao_ok',        req:false, w:1.0, na:true },
  { id:18, sec:'ambiental', type:'date',    lbl:'Data da última inspeção ambiental',              key:'data_insp_ambiental',  req:false },
  { id:19, sec:'ambiental', type:'text',    lbl:'Observações sobre condições do local',           key:'obs_local',            req:false },
  { id:20, sec:'docs',      type:'boolean', lbl:'Trabalhador com treinamento NR-35 em dia',       key:'nr35_valida',          req:true,  w:3.0, na:false },
  { id:21, sec:'docs',      type:'boolean', lbl:'Permissão de Trabalho (PT) assinada',            key:'pt_assinada',          req:true,  w:2.5, na:false },
  { id:22, sec:'docs',      type:'date',    lbl:'Validade do treinamento NR-35',                  key:'validade_nr35',        req:true  },
  { id:23, sec:'docs',      type:'text',    lbl:'Observações sobre documentação',                 key:'obs_docs',             req:false },
];

let expandedId  = null;
let selMode     = false;
let selectedIds = new Set();
let typeFilter  = '';
let textFilter  = '';

// ── RENDER ──
function render() {
  renderOutline();
  renderChips();
  renderFields();
  updateCount();
}

function renderOutline() {
  const el = document.getElementById('olList');
  const cnt = document.getElementById('secCnt');
  if (el) el.innerHTML = SECS.map((s,i) => {
    const n = FIELDS.filter(f => f.sec===s.id).length;
    return `<button class="ol-item${i===0?' active':''}" data-sec="${s.id}" onclick="jumpTo('${s.id}',this)">${s.lbl}<span class="ol-cnt">${n}</span></button>`;
  }).join('');
  if (cnt) cnt.textContent = SECS.length;
}

function renderChips() {
  const bar = document.getElementById('secChipsBar');
  if (!bar) return;
  bar.innerHTML = SECS.map((s,i) => {
    return `<button class="sec-chip${i===0?' active':''}" data-sec="${s.id}" onclick="jumpTo('${s.id}',this)">${s.lbl.split(' ').slice(0,2).join(' ')}</button>`;
  }).join('');
}

function renderFields() {
  let pos = 1;
  document.getElementById('fieldsInner').innerHTML = SECS.map(s => {
    const sf = FIELDS.filter(f => f.sec === s.id);
    const rows = sf.map(f => {
      const tlbl   = TLBL[f.type] || f.type.slice(0,3).toUpperCase();
      const viFlag = f.vi ? `<span class="f-vi" title="Visibilidade condicional">⇢</span>` : `<span class="f-vi"></span>`;
      const rdot   = f.req ? `<div class="f-rdot" title="Obrigatório"></div>` : '';
      const wt     = f.type==='boolean' ? `<div class="f-wt" title="Peso no score">${f.w}×</div>` : `<div class="f-wt"></div>`;
      const chk    = selMode ? `<div class="f-chk" onclick="event.stopPropagation()"><input type="checkbox" ${selectedIds.has(f.id)?'checked':''} onchange="toggleFieldSel(${f.id})"></div>` : '';
      const n      = pos < 10 ? '0'+pos : ''+pos; pos++;
      return `<div class="f-wrap" id="wrap-${f.id}" data-type="${f.type}" data-lbl="${f.lbl.toLowerCase()}" data-key="${f.key}">
        <div class="f-row${expandedId===f.id?' expanded':''}" id="row-${f.id}" onclick="toggleExp(${f.id},event)">
          ${chk}
          <div class="f-drag">⠿</div>
          <div class="f-num">${n}</div>
          <div class="f-type ${f.type}">${tlbl}</div>
          <div class="f-lbl">${f.lbl}</div>
          <div class="f-key">${f.key}</div>
          <div class="f-req">${rdot}</div>
          ${wt}${viFlag}
          <div class="f-arr" id="arr-${f.id}">›</div>
        </div>
        <div class="f-cfg${expandedId===f.id?' open':''}" id="cfg-${f.id}">${mkCfg(f)}</div>
      </div>`;
    }).join('');

    return `<div class="sec-group" id="sg-${s.id}">
      <div class="sec-hdr" onclick="toggleSecGroup('${s.id}',event)">
        <span class="sec-toggle" id="st-${s.id}">▾</span>
        <span class="sec-name">${s.lbl}</span>
        <span class="sec-count">${sf.length}</span>
        <div class="sec-acts" onclick="event.stopPropagation()">
          <button class="sec-act" onclick="alert('Renomear seção')">Renomear</button>
          <button class="sec-act" onclick="alert('Remover seção')">Remover</button>
        </div>
      </div>
      <div class="frows" id="fr-${s.id}">${rows}
        <div class="add-row">
          <button class="add-main" onclick="addField('${s.id}')">+ Campo</button>
          <div class="tchips">
            ${Object.entries(TLBL).map(([t,l])=>`<button class="tchip" title="${TNAME[t]}" onclick="addField('${s.id}','${t}')">${l}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  applyFilters();
}

function mkCfg(f) {
  const boolCfg = f.type==='boolean' ? `
    <div>
      <div class="flbl">Peso no score</div>
      <input class="finput" type="number" step="0.5" min="0.1" value="${f.w||1}" onchange="upd(${f.id},'w',parseFloat(this.value)||1)">
    </div>
    <div>
      <div class="flbl">Permite N/A</div>
      <select class="fselect" onchange="upd(${f.id},'na',this.value==='true')">
        <option value="false"${!f.na?' selected':''}>Não</option>
        <option value="true"${f.na?' selected':''}>Sim</option>
      </select>
    </div>` : '';
  const selCfg = f.type==='select' ? `
    <div class="cfg-full">
      <div class="flbl">Opções (separadas por vírgula)</div>
      <input class="finput" value="${(f.opts||[]).join(', ')}" placeholder="Ex: Conforme, Não conforme, Parcial" onchange="upd(${f.id},'opts',this.value.split(',').map(s=>s.trim()).filter(Boolean))">
    </div>` : '';
  const viSec = f.vi
    ? `<div class="vi-row">
        <span class="vi-lbl">Exibir se</span>
        <input class="finput" style="width:120px;font-family:var(--mono);font-size:12px;" value="${f.vi.field}" placeholder="chave do campo" onchange="updVi(${f.id},'field',this.value)">
        <select class="fselect" style="width:100px;" onchange="updVi(${f.id},'op',this.value)">
          <option value="eq"${f.vi.op==='eq'?' selected':''}>= igual a</option>
          <option value="neq"${f.vi.op==='neq'?' selected':''}>≠ diferente de</option>
        </select>
        <input class="finput" style="width:80px;" value="${f.vi.val}" placeholder="valor" onchange="updVi(${f.id},'val',this.value)">
        <button class="btn-danger btn-sm" onclick="upd(${f.id},'vi',null)">✕</button>
      </div>`
    : `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <button class="btn-ghost btn-sm" onclick="upd(${f.id},'vi',{field:'',op:'eq',val:''})">+ Condição</button>
        <span class="vi-hint">Sempre visível</span>
      </div>`;
  return `
    <div class="cfg-hdr">
      <span class="cfg-title">${TNAME[f.type]||f.type} · campo ${f.id<10?'0'+f.id:f.id}</span>
      <div class="cfg-acts">
        <button class="btn-ghost btn-sm" onclick="dupField(${f.id})">Duplicar</button>
        <button class="btn-danger btn-sm" onclick="delField(${f.id})">Remover</button>
      </div>
    </div>
    <div class="cfg-grid">
      <div class="cfg-2">
        <div class="flbl">Label</div>
        <input class="finput" value="${f.lbl.replace(/"/g,'&quot;')}" onchange="upd(${f.id},'lbl',this.value)">
      </div>
      <div>
        <div class="flbl">Tipo</div>
        <select class="fselect" onchange="upd(${f.id},'type',this.value)">
          ${Object.entries(TNAME).map(([v,l])=>`<option value="${v}"${f.type===v?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div>
        <div class="flbl">Chave (key)</div>
        <input class="finput" style="font-family:var(--mono);font-size:12px;" value="${f.key}" onchange="upd(${f.id},'key',this.value)">
      </div>
      <div>
        <div class="flbl">Obrigatório</div>
        <select class="fselect" onchange="upd(${f.id},'req',this.value==='true')">
          <option value="false"${!f.req?' selected':''}>Não</option>
          <option value="true"${f.req?' selected':''}>Sim</option>
        </select>
      </div>
      <div></div>
      ${boolCfg}${selCfg}
      <div class="cfg-full">
        <div class="flbl">Instrução para o inspetor</div>
        <textarea class="ftarea" placeholder="Ex: Verifique a data de validade e o lacre." onchange="upd(${f.id},'instr',this.value)">${f.instr||''}</textarea>
      </div>
      <div class="cfg-full">
        <div class="flbl" style="margin-bottom:6px;">Visibilidade condicional</div>
        ${viSec}
      </div>
    </div>`;
}

// ── INTERACTIONS ──
function toggleExp(id, e) {
  if (e && e.target.closest('.f-chk,.f-drag,.add-row,.sec-hdr,.cfg-hdr,.cfg-acts')) return;
  const wasOpen = expandedId === id;
  expandedId = wasOpen ? null : id;
  render();
  if (!wasOpen) {
    const pane = document.getElementById('fieldsPane');
    const row  = document.getElementById(`row-${id}`);
    if (pane && row) {
      const rowTop = row.getBoundingClientRect().top - pane.getBoundingClientRect().top + pane.scrollTop - 60;
      pane.scrollTo({ top: Math.max(0, rowTop), behavior: 'smooth' });
    }
  }
}

function toggleSecGroup(id, e) {
  if (e && e.target.closest('.sec-acts')) return;
  const rows = document.getElementById(`fr-${id}`);
  const tog  = document.getElementById(`st-${id}`);
  const coll = rows.style.display === 'none';
  rows.style.display = coll ? '' : 'none';
  tog.classList.toggle('coll', !coll);
}

function jumpTo(id, el) {
  document.querySelectorAll('.ol-item, .sec-chip').forEach(i => {
    if (i.dataset.sec === id) i.classList.add('active');
    else i.classList.remove('active');
  });
  const sg = document.getElementById(`sg-${id}`);
  if (sg) {
    const pane = document.getElementById('fieldsPane');
    pane.scrollTo({ top: sg.offsetTop - 4, behavior: 'smooth' });
    const rows = document.getElementById(`fr-${id}`);
    const tog  = document.getElementById(`st-${id}`);
    if (rows && rows.style.display === 'none') { rows.style.display = ''; if(tog) tog.classList.remove('coll'); }
  }
}

function doFilter(q) {
  textFilter = q.toLowerCase().trim();
  applyFilters();
}
function doTypeFilter(t) {
  typeFilter = t;
  applyFilters();
}
function applyFilters() {
  let vis = 0;
  document.querySelectorAll('.f-wrap').forEach(w => {
    const tm = !typeFilter || w.dataset.type === typeFilter;
    const lm = !textFilter || w.dataset.lbl.includes(textFilter) || w.dataset.key.includes(textFilter);
    const hide = !(tm && lm);
    w.classList.toggle('hidden', hide);
    if (!hide) vis++;
  });
  updateCount(vis);
}
function updateCount(vis) {
  const n = vis !== undefined ? vis : FIELDS.length;
  const lbl = document.getElementById('fcLbl');
  if (lbl) lbl.textContent = (textFilter || typeFilter) ? `${n} de ${FIELDS.length}` : `${FIELDS.length} campos · ${SECS.length} seções`;
}

function toggleSel() {
  selMode = !selMode;
  if (!selMode) { selectedIds.clear(); document.getElementById('bulkBar').classList.remove('on'); }
  document.getElementById('selBtn').textContent = selMode ? '✕ Cancelar' : '☐ Selecionar';
  render();
}
function toggleFieldSel(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  document.getElementById('bulkInfo').textContent = `${selectedIds.size} selecionado${selectedIds.size!==1?'s':''}`;
  document.getElementById('bulkBar').classList.toggle('on', selectedIds.size > 0);
}
function clearSel() { selectedIds.clear(); selMode = false; document.getElementById('bulkBar').classList.remove('on'); document.getElementById('selBtn').textContent = '☐ Selecionar'; render(); }
function delSelected() { if (!confirm(`Remover ${selectedIds.size} campo(s)?`)) return; selectedIds.forEach(id => { const i = FIELDS.findIndex(f=>f.id===id); if(i!==-1) FIELDS.splice(i,1); }); clearSel(); }
function delField(id) { if (!confirm('Remover este campo?')) return; const i = FIELDS.findIndex(f=>f.id===id); if(i!==-1){ FIELDS.splice(i,1); expandedId=null; render(); } }
function dupField(id) { const f=FIELDS.find(f=>f.id===id); if(!f) return; const nf={...f,id:Math.max(...FIELDS.map(x=>x.id))+1,key:f.key+'_copia',lbl:f.lbl+' (cópia)'}; const i=FIELDS.indexOf(f); FIELDS.splice(i+1,0,nf); expandedId=nf.id; render(); }
function upd(id, p, v) { const f=FIELDS.find(f=>f.id===id); if(f){ f[p]=v; expandedId=id; render(); } }
function updVi(id, p, v) { const f=FIELDS.find(f=>f.id===id); if(f&&f.vi) f.vi[p]=v; }

function addField(secId, type='boolean') {
  const sf=FIELDS.filter(f=>f.sec===secId);
  const last=sf[sf.length-1];
  const idx=last?FIELDS.indexOf(last):FIELDS.length-1;
  const nid=Math.max(...FIELDS.map(x=>x.id))+1;
  const nf={id:nid,sec:secId,type,lbl:'',key:`campo_${nid}`,req:false,w:1.0,na:false};
  FIELDS.splice(idx+1,0,nf);
  expandedId=nid; render();
  const pane=document.getElementById('fieldsPane');
  const row=document.getElementById(`row-${nid}`);
  if(pane&&row){ const top=row.getBoundingClientRect().top-pane.getBoundingClientRect().top+pane.scrollTop-60; pane.scrollTo({top:Math.max(0,top),behavior:'smooth'}); }
  setTimeout(()=>{ const inp=document.querySelector(`#cfg-${nid} .finput`); if(inp) inp.focus(); },100);
}

function addSec() { alert('Adicionar nova seção: insira o nome e ela aparece no outline e na lista de campos.'); }

// Sync outline active on scroll
document.getElementById('fieldsPane').addEventListener('scroll', () => {
  const pane = document.getElementById('fieldsPane');
  const paneTop = pane.getBoundingClientRect().top;
  let activeId = SECS[0].id;
  SECS.forEach(s => {
    const el = document.getElementById(`sg-${s.id}`);
    if (el && el.getBoundingClientRect().top - paneTop < 60) activeId = s.id;
  });
  document.querySelectorAll('.ol-item, .sec-chip').forEach(i => {
    i.classList.toggle('active', i.dataset.sec === activeId);
  });
});

render();
</script>
</body>
</html>
